<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Face Drop</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      min-height: 100vh;
      font-family: -apple-system, sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    #canvas { display: block; background: #000; }

    /* 상단 보조 버튼 */
    #topUI {
      position: fixed;
      top: 20px;
      right: 16px;
      display: flex;
      gap: 8px;
      z-index: 10;
      align-items: center;
    }
    .btnSm {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      white-space: nowrap;
      transition: background 0.12s;
    }
    .btnSm:active { background: rgba(255,255,255,0.25); }

    /* 하단 메인 버튼 */
    #bottomUI {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      z-index: 10;
      align-items: center;
    }
    .btnMain {
      background: rgba(255,255,255,0.13);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 60px;
      padding: 16px 32px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      white-space: nowrap;
      transition: background 0.12s, transform 0.08s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btnMain:active { background: rgba(255,255,255,0.28); transform: scale(0.96); }
    .btnMain:disabled { opacity: 0.3; pointer-events: none; }

    /* 모델 로딩 */
    #modelStatus {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: rgba(255,255,255,0.65);
      border-radius: 50px;
      padding: 8px 18px;
      font-size: 12px;
      z-index: 300;
      backdrop-filter: blur(8px);
      transition: opacity 0.6s;
      white-space: nowrap;
    }

    /* 큐 배지 */
    #queueBadge {
      display: none;
      position: fixed;
      top: 20px;
      left: 16px;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6);
      border-radius: 50px;
      padding: 7px 13px;
      font-size: 11px;
      z-index: 300;
      backdrop-filter: blur(8px);
    }
    #queueBadge.show { display: block; }

    /* 토스트 */
    #toast {
      display: none;
      position: fixed;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30,30,30,0.9);
      color: #fff;
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 14px;
      z-index: 300;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    #toast.show { display: block; }

    /* 얼굴 카운터 */
    #faceCounter {
      position: fixed;
      bottom: 8px;
      left: 12px;
      color: rgba(255,255,255,0.2);
      font-size: 10px;
      pointer-events: none;
      z-index: 5;
    }
    #version {
      position: fixed;
      bottom: 8px;
      right: 12px;
      color: rgba(255,255,255,0.2);
      font-size: 10px;
      pointer-events: none;
      z-index: 5;
    }

    /* 안내 화면 */
    #guide {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: #fff;
      padding: 40px;
    }
    #guide h1 { font-size: 24px; font-weight: 700; text-align: center; letter-spacing: -0.5px; }
    #guide .tips {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      line-height: 2.2;
      width: 100%;
      max-width: 320px;
    }
    #startBtn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 60px;
      padding: 16px 48px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    #startBtn:active { opacity: 0.8; }

    /* 확인 모달 */
    #confirmModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 400;
      align-items: center;
      justify-content: center;
    }
    #confirmModal.show { display: flex; }
    #confirmBox {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 28px 32px;
      text-align: center;
      color: #fff;
      max-width: 280px;
      width: 90%;
    }
    #confirmBox p { font-size: 15px; margin-bottom: 20px; color: rgba(255,255,255,0.8); }
    #confirmBox .confirmBtns { display: flex; gap: 10px; justify-content: center; }
    #confirmBox button {
      border-radius: 50px;
      padding: 11px 24px;
      font-size: 14px;
      cursor: pointer;
      border: none;
    }
    #confirmYes { background: #ff4444; color: #fff; }
    #confirmNo { background: rgba(255,255,255,0.12); color: #fff; }

    /* 카메라 모달 */
    #cameraModal {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #cameraModal.open { display: flex; }
    #video {
      width: 100%;
      max-height: 75vh;
      object-fit: cover;
    }
    #video.mirrored { transform: scaleX(-1); }
    #camControls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      align-items: center;
    }
    #shootBtn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 4px solid #fff;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
    }
    #shootBtn:active { background: rgba(255,255,255,0.6); }
    #closeCamBtn {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      padding: 12px 20px;
      font-size: 14px;
      cursor: pointer;
    }
    #fileInput, #snapCanvas { display: none; }
  </style>
</head>
<body>

<div id="guide">
  <h1>😄 Face Drop</h1>
  <div class="tips">
    ✅ 얼굴이 잘 보이는 사진<br>
    ✅ 정면 또는 약간 옆 각도<br>
    ✅ 단체사진도 OK<br>
    ✅ 밝은 조명
  </div>
  <button id="startBtn">시작하기</button>
</div>

<canvas id="canvas"></canvas>
<div id="version">v0.7</div>
<div id="faceCounter">얼굴 0개</div>
<div id="modelStatus">⏳ 모델 로딩 중...</div>
<div id="queueBadge"></div>
<div id="toast"></div>

<!-- 상단 보조 버튼 -->
<div id="topUI">
  <button class="btnSm" id="shakeBtn">🫨 흔들기</button>
  <button class="btnSm" id="resetBtn">🗑 초기화</button>
</div>

<!-- 하단 메인 버튼 -->
<div id="bottomUI">
  <button class="btnMain" id="cameraBtn" disabled>📷 <span>촬영</span></button>
  <button class="btnMain" id="uploadBtn" disabled>🖼 <span>갤러리</span></button>
  <input type="file" id="fileInput" accept="image/*" multiple>
</div>

<!-- 초기화 확인 모달 -->
<div id="confirmModal">
  <div id="confirmBox">
    <p>얼굴을 모두 지울까요?</p>
    <div class="confirmBtns">
      <button id="confirmNo">취소</button>
      <button id="confirmYes">지우기</button>
    </div>
  </div>
</div>

<div id="cameraModal">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="snapCanvas"></canvas>
  <div id="camControls">
    <button id="closeCamBtn">✕ 닫기</button>
    <button id="shootBtn"></button>
    <button id="switchCamBtn" class="btnSm">🔄</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');
const cameraBtn = document.getElementById('cameraBtn');
const shakeBtn = document.getElementById('shakeBtn');
const resetBtn = document.getElementById('resetBtn');
const cameraModal = document.getElementById('cameraModal');
const video = document.getElementById('video');
const shootBtn = document.getElementById('shootBtn');
const closeCamBtn = document.getElementById('closeCamBtn');
const switchCamBtn = document.getElementById('switchCamBtn');
const snapCanvas = document.getElementById('snapCanvas');
const toastEl = document.getElementById('toast');
const guide = document.getElementById('guide');
const startBtn = document.getElementById('startBtn');
const modelStatus = document.getElementById('modelStatus');
const queueBadge = document.getElementById('queueBadge');
const faceCounter = document.getElementById('faceCounter');
const confirmModal = document.getElementById('confirmModal');
const confirmYes = document.getElementById('confirmYes');
const confirmNo = document.getElementById('confirmNo');

startBtn.addEventListener('click', () => { guide.style.display = 'none'; });

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let toastTimer = null;
function showToast(msg, color = 'rgba(30,30,30,0.9)') {
  toastEl.textContent = msg;
  toastEl.style.background = color;
  toastEl.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
}

// 모델 로딩
const MODEL_URL = '/photo-drop-game';
let modelsLoaded = false;

async function loadModels() {
  if (modelsLoaded) return true;
  try {
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL),
    ]);
    modelsLoaded = true;
    modelStatus.textContent = '✅ 준비됐어요';
    setTimeout(() => { modelStatus.style.opacity = '0'; }, 1500);
    uploadBtn.disabled = false;
    cameraBtn.disabled = false;
    return true;
  } catch(e) {
    modelStatus.textContent = '❌ 모델 로딩 실패 — 새로고침해주세요';
    return false;
  }
}

// 처리 큐
const queue = [];
let isProcessing = false;

function updateQueueBadge() {
  if (queue.length === 0) { queueBadge.classList.remove('show'); return; }
  queueBadge.textContent = `⏳ ${queue.length}장 처리 중`;
  queueBadge.classList.add('show');
}

async function enqueue(imgEl) {
  queue.push(imgEl);
  updateQueueBadge();
  if (!isProcessing) processQueue();
}

async function processQueue() {
  if (queue.length === 0) { isProcessing = false; updateQueueBadge(); return; }
  isProcessing = true;
  const img = queue.shift();
  updateQueueBadge();
  await processImage(img);
  processQueue();
}

// 얼굴 감지 + 크롭
async function detectAndCropFaces(imgEl) {
  const iw = imgEl.naturalWidth || imgEl.width;
  const ih = imgEl.naturalHeight || imgEl.height;

  // 속도 개선: 큰 이미지 리사이즈 후 감지
  let detectTarget = imgEl;
  const maxDetectSize = 800;
  let scaleRatio = 1;
  if (iw > maxDetectSize || ih > maxDetectSize) {
    scaleRatio = maxDetectSize / Math.max(iw, ih);
    const resizeCanvas = document.createElement('canvas');
    resizeCanvas.width = Math.round(iw * scaleRatio);
    resizeCanvas.height = Math.round(ih * scaleRatio);
    resizeCanvas.getContext('2d').drawImage(imgEl, 0, 0, resizeCanvas.width, resizeCanvas.height);
    detectTarget = resizeCanvas;
  }

  const options = new faceapi.TinyFaceDetectorOptions({
    inputSize: 416,
    scoreThreshold: 0.3
  });

  const detections = await faceapi
    .detectAllFaces(detectTarget, options)
    .withFaceLandmarks(true);

  if (!detections || detections.length === 0) return [];

  const results = [];

  detections.forEach(det => {
    // 리사이즈된 좌표 → 원본 좌표로 역변환
    const landmarks = det.landmarks;
    const allPoints = landmarks.positions.map(p => ({
      x: p.x / scaleRatio,
      y: p.y / scaleRatio
    }));

    const box = det.detection.box;
    const boxH = box.height / scaleRatio;

    // 얼굴 비율 → 화면 크기 매핑 (전체적으로 70% 수준으로 축소)
    const faceRatio = boxH / ih;
    const minScreenRatio = 0.055;  // 기존 0.08 → 0.055
    const maxScreenRatio = 0.24;   // 기존 0.35 → 0.24
    const clampedRatio = Math.max(0.05, Math.min(0.8, faceRatio));
    const t = (clampedRatio - 0.05) / (0.8 - 0.05);
    const screenRatio = minScreenRatio + t * (maxScreenRatio - minScreenRatio);
    const targetH_px = canvas.height * screenRatio;

    // 랜드마크 인덱스 (face-api 68점 기준)
    const jaw = allPoints.slice(0, 17);          // 턱선
    const leftBrow = allPoints.slice(17, 22);    // 왼쪽 눈썹
    const rightBrow = allPoints.slice(22, 27);   // 오른쪽 눈썹

    const browTopY = Math.min(...leftBrow.map(p => p.y), ...rightBrow.map(p => p.y));
    const chinY = Math.max(...jaw.map(p => p.y));
    const foreheadOffset = (chinY - browTopY) * 0.45;
    const foreheadY = browTopY - foreheadOffset;

    const contour = [
      { x: jaw[0].x, y: jaw[0].y },
      { x: jaw[0].x, y: foreheadY },
      { x: (jaw[0].x + jaw[16].x) / 2, y: foreheadY },
      { x: jaw[16].x, y: foreheadY },
      { x: jaw[16].x, y: jaw[16].y },
      ...jaw.slice(1, 16).reverse()
    ];

    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    contour.forEach(p => {
      minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
    });

    const pad = 0.05;
    const padX = (maxX - minX) * pad;
    const padY = (maxY - minY) * pad;
    minX = Math.max(0, minX - padX); minY = Math.max(0, minY - padY);
    maxX = Math.min(iw, maxX + padX); maxY = Math.min(ih, maxY + padY);

    const cropW = maxX - minX;
    const cropH = maxY - minY;

    const fc = document.createElement('canvas');
    fc.width = Math.round(cropW);
    fc.height = Math.round(cropH);
    const fctx = fc.getContext('2d');

    const localContour = contour.map(p => ({ x: p.x - minX, y: p.y - minY }));

    fctx.save();
    fctx.beginPath();
    fctx.moveTo(localContour[0].x, localContour[0].y);
    localContour.slice(1).forEach(p => fctx.lineTo(p.x, p.y));
    fctx.closePath();
    fctx.clip();
    fctx.drawImage(imgEl, minX, minY, cropW, cropH, 0, 0, fc.width, fc.height);
    fctx.restore();

    // 경계 페이드 (경량화)
    const imgData = fctx.getImageData(0, 0, fc.width, fc.height);
    const d = imgData.data;
    const fadeW = 4;
    for (let py = 0; py < fc.height; py++) {
      for (let px = 0; px < fc.width; px++) {
        const idx = (py * fc.width + px) * 4;
        if (d[idx + 3] === 0) continue;
        const edgeDist = Math.min(px, py, fc.width - 1 - px, fc.height - 1 - py);
        if (edgeDist < fadeW) d[idx + 3] = Math.round(d[idx + 3] * edgeDist / fadeW);
      }
    }
    fctx.putImageData(imgData, 0, 0);

    const faceImg = new Image();
    faceImg.src = fc.toDataURL('image/png');
    results.push({ img: faceImg, cropW, cropH, targetH: targetH_px });
  });

  await Promise.all(results.map(r => new Promise(res => {
    if (r.img.complete) res(); else r.img.onload = res;
  })));

  return results;
}

// 물리
const GRAVITY = 0.52;
const FLOOR_FRICTION = 0.72;
const BOUNCE = 0.28;
const AIR_FRICTION = 0.996;
const ANGULAR_DAMP = 0.83;

const objects = [];

function updateFaceCounter() {
  faceCounter.textContent = `얼굴 ${objects.length}개`;
}

class FaceObject {
  constructor(img, x, y, w, h) {
    this.img = img;
    this.x = x; this.y = y;
    this.w = w; this.h = h;
    this.vx = (Math.random() - 0.5) * 5;
    this.vy = 0;
    this.angle = (Math.random() - 0.5) * 0.15;
    this.av = (Math.random() - 0.5) * 0.025;
    this.isDragging = false;
    this.lastX = x; this.lastY = y;
    this.rx = w * 0.44;
    this.ry = h * 0.44;
    this.r = Math.min(this.rx, this.ry);
  }

  update() {
    if (this.isDragging) return;
    this.vy += GRAVITY;
    this.vx *= AIR_FRICTION;
    this.x += this.vx; this.y += this.vy;
    this.angle += this.av;
    this.av *= ANGULAR_DAMP;

    const floor = canvas.height - this.ry;
    if (this.y >= floor) {
      this.y = floor; this.vy *= -BOUNCE;
      this.vx *= FLOOR_FRICTION; this.av *= FLOOR_FRICTION;
      if (Math.abs(this.vy) < 1.0) this.vy = 0;
    }
    if (this.x - this.rx <= 0) { this.x = this.rx; this.vx = Math.abs(this.vx) * BOUNCE; this.av *= -0.4; }
    if (this.x + this.rx >= canvas.width) { this.x = canvas.width - this.rx; this.vx = -Math.abs(this.vx) * BOUNCE; this.av *= -0.4; }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 14;
    ctx.shadowOffsetY = 6;
    ctx.drawImage(this.img, -this.w / 2, -this.h / 2, this.w, this.h);
    ctx.restore();
  }

  hitTest(px, py) {
    const dx = (px - this.x) / this.rx;
    const dy = (py - this.y) / this.ry;
    return dx * dx + dy * dy <= 1;
  }
}

function resolveCollisions() {
  for (let iter = 0; iter < 3; iter++) {
    for (let i = 0; i < objects.length; i++) {
      for (let j = i + 1; j < objects.length; j++) {
        const a = objects[i], b = objects[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const distSq = dx*dx + dy*dy;
        const minDist = a.r + b.r;
        if (distSq >= minDist*minDist || distSq < 0.01) continue;
        const dist = Math.sqrt(distSq);
        const nx = dx/dist, ny = dy/dist;
        const overlap = (minDist - dist) * 0.5;
        if (!a.isDragging) { a.x -= nx*overlap; a.y -= ny*overlap; }
        if (!b.isDragging) { b.x += nx*overlap; b.y += ny*overlap; }
        const dot = (a.vx-b.vx)*nx + (a.vy-b.vy)*ny;
        if (dot <= 0) continue;
        const imp = dot * 0.6;
        if (!a.isDragging) { a.vx -= imp*nx; a.vy -= imp*ny; a.av += imp*0.025*(Math.random()-0.5); }
        if (!b.isDragging) { b.vx += imp*nx; b.vy += imp*ny; b.av -= imp*0.025*(Math.random()-0.5); }
      }
    }
  }
}

async function processImage(imgEl) {
  const faces = await detectAndCropFaces(imgEl);
  if (faces.length === 0) {
    showToast('😅 얼굴을 찾지 못했어요');
    return;
  }
  faces.forEach(face => {
    const scale = face.targetH / face.cropH;
    const fw = face.cropW * scale;
    const fh = face.targetH;
    const x = fw / 2 + Math.random() * (canvas.width - fw);
    objects.push(new FaceObject(face.img, x, -fh, fw, fh));
  });
  updateFaceCounter();
  if (faces.length > 1) showToast(`😊 얼굴 ${faces.length}개 발견!`, 'rgba(40,140,70,0.9)');
}

// 갤러리
uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => enqueue(img);
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  fileInput.value = '';
});

// 카메라
let stream = null;
let facingMode = 'environment';

async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false
    });
    video.srcObject = stream;
    // 전면 카메라일 때 좌우반전
    video.classList.toggle('mirrored', facingMode === 'user');
    cameraModal.classList.add('open');
  } catch {
    alert('카메라 권한이 필요해요.\n설정 > Safari > 카메라를 허용해주세요.');
  }
}

function stopCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  cameraModal.classList.remove('open');
}

cameraBtn.addEventListener('click', startCamera);
closeCamBtn.addEventListener('click', stopCamera);
switchCamBtn.addEventListener('click', () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});

shootBtn.addEventListener('click', () => {
  const vw = video.videoWidth;
  const vh = video.videoHeight;
  snapCanvas.width = vw;
  snapCanvas.height = vh;
  const sctx = snapCanvas.getContext('2d');

  // 전면 카메라면 캔버스에서도 좌우반전
  if (facingMode === 'user') {
    sctx.translate(vw, 0);
    sctx.scale(-1, 1);
  }
  sctx.drawImage(video, 0, 0);

  const img = new Image();
  img.onload = () => enqueue(img);
  img.src = snapCanvas.toDataURL('image/jpeg', 0.92);
  stopCamera();
});

// 흔들기
shakeBtn.addEventListener('click', () => {
  objects.forEach(o => {
    if (!o.isDragging) {
      o.vx += (Math.random() - 0.5) * 24;
      o.vy += (Math.random() - 0.75) * 20;
      o.av += (Math.random() - 0.5) * 0.4;
    }
  });
});

// 초기화 (확인 모달)
resetBtn.addEventListener('click', () => confirmModal.classList.add('show'));
confirmNo.addEventListener('click', () => confirmModal.classList.remove('show'));
confirmYes.addEventListener('click', () => {
  objects.length = 0;
  updateFaceCounter();
  confirmModal.classList.remove('show');
  showToast('🗑 초기화됐어요');
});

// 드래그 (마우스)
let dragTarget = null;
canvas.addEventListener('mousedown', (e) => {
  for (let i = objects.length - 1; i >= 0; i--) {
    if (objects[i].hitTest(e.clientX, e.clientY)) {
      dragTarget = objects[i];
      dragTarget.isDragging = true;
      dragTarget.vx = 0; dragTarget.vy = 0;
      dragTarget.lastX = e.clientX; dragTarget.lastY = e.clientY;
      break;
    }
  }
});
canvas.addEventListener('mousemove', (e) => {
  if (!dragTarget) return;
  dragTarget.vx = e.clientX - dragTarget.lastX;
  dragTarget.vy = e.clientY - dragTarget.lastY;
  dragTarget.x = e.clientX; dragTarget.y = e.clientY;
  dragTarget.lastX = e.clientX; dragTarget.lastY = e.clientY;
});
canvas.addEventListener('mouseup', () => {
  if (dragTarget) { dragTarget.isDragging = false; dragTarget = null; }
});

// 드래그 (터치)
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  for (let i = objects.length - 1; i >= 0; i--) {
    if (objects[i].hitTest(t.clientX, t.clientY)) {
      dragTarget = objects[i];
      dragTarget.isDragging = true;
      dragTarget.vx = 0; dragTarget.vy = 0;
      dragTarget.lastX = t.clientX; dragTarget.lastY = t.clientY;
      break;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!dragTarget) return;
  const t = e.touches[0];
  dragTarget.vx = t.clientX - dragTarget.lastX;
  dragTarget.vy = t.clientY - dragTarget.lastY;
  dragTarget.x = t.clientX; dragTarget.y = t.clientY;
  dragTarget.lastX = t.clientX; dragTarget.lastY = t.clientY;
}, { passive: false });

canvas.addEventListener('touchend', () => {
  if (dragTarget) { dragTarget.isDragging = false; dragTarget = null; }
});

// 게임 루프
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  resolveCollisions();
  objects.forEach(o => { o.update(); o.draw(); });
  requestAnimationFrame(loop);
}
loop();

loadModels();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
