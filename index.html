<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Face Drop</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      min-height: 100vh;
      font-family: sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    #canvas { display: block; background: #000; }
    #ui {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
      align-items: center;
    }
    .btn {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 50px;
      padding: 12px 22px;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      white-space: nowrap;
      transition: background 0.12s;
    }
    .btn:active { background: rgba(255,255,255,0.3); }
    #shakeBtn {
      background: rgba(255,100,50,0.18);
      border-color: rgba(255,120,60,0.5);
      color: #ff9966;
    }
    #shakeBtn:active { background: rgba(255,100,50,0.45); }
    #processing {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: #fff;
      font-size: 15px;
    }
    #processing.show { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #toast {
      display: none;
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(220,60,60,0.9);
      color: #fff;
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 14px;
      z-index: 300;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    #toast.show { display: block; }
    #guide {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: #fff;
      padding: 40px;
    }
    #guide h1 { font-size: 22px; font-weight: 600; text-align: center; }
    #guide .tips {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      line-height: 2;
      width: 100%;
      max-width: 320px;
    }
    #startBtn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 50px;
      padding: 16px 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    #startBtn:active { opacity: 0.8; }
    #cameraModal {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #cameraModal.open { display: flex; }
    #video { width: 100%; max-height: 75vh; object-fit: cover; }
    #camControls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      align-items: center;
    }
    #shootBtn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 4px solid #fff;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
    }
    #shootBtn:active { background: rgba(255,255,255,0.6); }
    #closeCamBtn {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 50px;
      padding: 12px 22px;
      font-size: 14px;
      cursor: pointer;
    }
    #fileInput, #snapCanvas { display: none; }
  </style>
</head>
<body>

<div id="guide">
  <h1>😄 Face Drop</h1>
  <div class="tips">
    ✅ 얼굴이 크고 선명한 사진<br>
    ✅ 정면 또는 약간 옆 각도<br>
    ✅ 밝은 조명<br>
    ✅ 여러 명이면 각각 따로 떨어져요
  </div>
  <button id="startBtn">시작하기</button>
</div>

<canvas id="canvas"></canvas>

<div id="processing">
  <div class="spinner"></div>
  <span id="processingMsg">얼굴 찾는 중...</span>
</div>
<div id="toast"></div>

<div id="ui">
  <button class="btn" id="cameraBtn">📷 촬영</button>
  <button class="btn" id="uploadBtn">🖼 갤러리</button>
  <button class="btn" id="shakeBtn">🫨 흔들기</button>
  <input type="file" id="fileInput" accept="image/*" multiple>
</div>

<div id="cameraModal">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="snapCanvas"></canvas>
  <div id="camControls">
    <button id="closeCamBtn">✕ 닫기</button>
    <button id="shootBtn"></button>
    <button id="switchCamBtn" class="btn" style="padding:12px 18px;">🔄</button>
  </div>
</div>

<!-- MediaPipe Face Mesh -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');
const cameraBtn = document.getElementById('cameraBtn');
const shakeBtn = document.getElementById('shakeBtn');
const cameraModal = document.getElementById('cameraModal');
const video = document.getElementById('video');
const shootBtn = document.getElementById('shootBtn');
const closeCamBtn = document.getElementById('closeCamBtn');
const switchCamBtn = document.getElementById('switchCamBtn');
const snapCanvas = document.getElementById('snapCanvas');
const processingEl = document.getElementById('processing');
const processingMsg = document.getElementById('processingMsg');
const toastEl = document.getElementById('toast');
const guide = document.getElementById('guide');
const startBtn = document.getElementById('startBtn');

startBtn.addEventListener('click', () => { guide.style.display = 'none'; });

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let toastTimer = null;
function showToast(msg, color = 'rgba(220,60,60,0.9)') {
  toastEl.textContent = msg;
  toastEl.style.background = color;
  toastEl.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2800);
}

// Face Mesh 랜드마크 인덱스 — 얼굴 외곽 윤곽선
// 이마 → 오른쪽 → 턱 → 왼쪽 순서 (OVAL)
const FACE_OVAL = [
  10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288,
  397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136,
  172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109
];

let faceMesh = null;
let meshReady = false;
let faceDetector = null;
let detectorReady = false;

function initModels() {
  // Face Detection (얼굴 위치 파악용)
  if (!detectorReady && typeof FaceDetection !== 'undefined') {
    faceDetector = new FaceDetection({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${f}`
    });
    faceDetector.setOptions({ model: 'short', minDetectionConfidence: 0.5 });
    faceDetector.initialize().then(() => { detectorReady = true; }).catch(() => {});
  }

  // Face Mesh (윤곽선 추출용)
  if (!meshReady && typeof FaceMesh !== 'undefined') {
    faceMesh = new FaceMesh({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
    });
    faceMesh.setOptions({
      maxNumFaces: 10,
      refineLandmarks: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    faceMesh.initialize().then(() => { meshReady = true; }).catch(() => {});
  }
}

async function waitReady(checkFn, timeout = 8000) {
  return new Promise(resolve => {
    const interval = setInterval(() => {
      if (checkFn()) { clearInterval(interval); resolve(true); }
    }, 200);
    setTimeout(() => { clearInterval(interval); resolve(false); }, timeout);
  });
}

// Face Mesh로 얼굴 윤곽 폴리곤 추출
async function getFacePolygons(imgEl) {
  if (!meshReady || !faceMesh) return [];

  return new Promise(resolve => {
    const timeout = setTimeout(() => resolve([]), 6000);

    faceMesh.onResults(results => {
      clearTimeout(timeout);
      if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
        resolve([]);
        return;
      }

      const iw = imgEl.naturalWidth || imgEl.width;
      const ih = imgEl.naturalHeight || imgEl.height;
      const polygons = [];

      results.multiFaceLandmarks.forEach(landmarks => {
        // OVAL 랜드마크만 추출
        const points = FACE_OVAL.map(idx => ({
          x: landmarks[idx].x * iw,
          y: landmarks[idx].y * ih
        }));

        // 바운딩 박스 계산
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        points.forEach(p => {
          minX = Math.min(minX, p.x);
          minY = Math.min(minY, p.y);
          maxX = Math.max(maxX, p.x);
          maxY = Math.max(maxY, p.y);
        });

        // 여백 추가
        const padX = (maxX - minX) * 0.08;
        const padY = (maxY - minY) * 0.1;
        minX = Math.max(0, minX - padX);
        minY = Math.max(0, minY - padY);
        maxX = Math.min(iw, maxX + padX);
        maxY = Math.min(ih, maxY + padY);

        const cropW = maxX - minX;
        const cropH = maxY - minY;

        // 폴리곤 좌표를 크롭 기준으로 변환
        const localPoints = points.map(p => ({
          x: p.x - minX,
          y: p.y - minY
        }));

        // 크롭 캔버스 생성
        const fc = document.createElement('canvas');
        fc.width = Math.round(cropW);
        fc.height = Math.round(cropH);
        const fctx = fc.getContext('2d');

        // 얼굴 윤곽 폴리곤 클리핑
        fctx.save();
        fctx.beginPath();
        fctx.moveTo(localPoints[0].x, localPoints[0].y);
        localPoints.slice(1).forEach(p => fctx.lineTo(p.x, p.y));
        fctx.closePath();
        fctx.clip();

        // 원본 이미지 크롭 영역 그리기
        fctx.drawImage(imgEl, minX, minY, cropW, cropH, 0, 0, fc.width, fc.height);
        fctx.restore();

        // 경계 페이드 (폴리곤 엣지 부드럽게)
        const imgData = fctx.getImageData(0, 0, fc.width, fc.height);
        const d = imgData.data;

        // 각 픽셀이 폴리곤 내부인지 체크 + 엣지 거리로 페이드
        for (let py = 0; py < fc.height; py++) {
          for (let px = 0; px < fc.width; px++) {
            const idx = (py * fc.width + px) * 4;
            if (d[idx + 3] === 0) continue;

            // 폴리곤 경계까지의 최소 거리
            let minEdgeDist = Infinity;
            for (let k = 0; k < localPoints.length; k++) {
              const p1 = localPoints[k];
              const p2 = localPoints[(k + 1) % localPoints.length];
              const dx = p2.x - p1.x;
              const dy = p2.y - p1.y;
              const len = Math.sqrt(dx * dx + dy * dy);
              if (len < 0.001) continue;
              const t = Math.max(0, Math.min(1, ((px - p1.x) * dx + (py - p1.y) * dy) / (len * len)));
              const closestX = p1.x + t * dx;
              const closestY = p1.y + t * dy;
              const dist = Math.sqrt((px - closestX) ** 2 + (py - closestY) ** 2);
              minEdgeDist = Math.min(minEdgeDist, dist);
            }

            // 엣지 8px 페이드
            const fadeWidth = 8;
            if (minEdgeDist < fadeWidth) {
              d[idx + 3] = Math.round(d[idx + 3] * (minEdgeDist / fadeWidth));
            }
          }
        }
        fctx.putImageData(imgData, 0, 0);

        const faceImg = new Image();
        faceImg.src = fc.toDataURL('image/png');
        polygons.push({
          img: faceImg,
          w: fc.width,
          h: fc.height,
          points: localPoints
        });
      });

      Promise.all(polygons.map(p => new Promise(res => {
        if (p.img.complete) res();
        else p.img.onload = res;
      }))).then(() => resolve(polygons));
    });

    faceMesh.send({ image: imgEl }).catch(() => {
      clearTimeout(timeout);
      resolve([]);
    });
  });
}

// 물리 상수
const GRAVITY = 0.52;
const FLOOR_FRICTION = 0.72;
const BOUNCE = 0.28;
const AIR_FRICTION = 0.996;
const ANGULAR_DAMP = 0.83;

const objects = [];

class FaceObject {
  constructor(img, x, y, w, h) {
    this.img = img;
    this.x = x;
    this.y = y;
    this.w = w;
    this.h = h;
    this.vx = (Math.random() - 0.5) * 5;
    this.vy = 0;
    this.angle = (Math.random() - 0.5) * 0.15;
    this.av = (Math.random() - 0.5) * 0.025;
    this.isDragging = false;
    this.lastX = x;
    this.lastY = y;
    this.rx = w * 0.44;
    this.ry = h * 0.44;
    this.r = Math.min(this.rx, this.ry);
  }

  update() {
    if (this.isDragging) return;
    this.vy += GRAVITY;
    this.vx *= AIR_FRICTION;
    this.x += this.vx;
    this.y += this.vy;
    this.angle += this.av;
    this.av *= ANGULAR_DAMP;

    const floor = canvas.height - this.ry;
    if (this.y >= floor) {
      this.y = floor;
      this.vy *= -BOUNCE;
      this.vx *= FLOOR_FRICTION;
      this.av *= FLOOR_FRICTION;
      if (Math.abs(this.vy) < 1.0) this.vy = 0;
    }
    if (this.x - this.rx <= 0) {
      this.x = this.rx;
      this.vx = Math.abs(this.vx) * BOUNCE;
      this.av *= -0.4;
    }
    if (this.x + this.rx >= canvas.width) {
      this.x = canvas.width - this.rx;
      this.vx = -Math.abs(this.vx) * BOUNCE;
      this.av *= -0.4;
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 16;
    ctx.shadowOffsetY = 7;
    ctx.drawImage(this.img, -this.w / 2, -this.h / 2, this.w, this.h);
    ctx.restore();
  }

  hitTest(px, py) {
    const dx = (px - this.x) / this.rx;
    const dy = (py - this.y) / this.ry;
    return dx * dx + dy * dy <= 1;
  }
}

function resolveCollisions() {
  for (let iter = 0; iter < 3; iter++) {
    for (let i = 0; i < objects.length; i++) {
      for (let j = i + 1; j < objects.length; j++) {
        const a = objects[i];
        const b = objects[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const distSq = dx * dx + dy * dy;
        const minDist = a.r + b.r;
        if (distSq >= minDist * minDist || distSq < 0.01) continue;
        const dist = Math.sqrt(distSq);
        const nx = dx / dist;
        const ny = dy / dist;
        const overlap = (minDist - dist) * 0.5;
        if (!a.isDragging) { a.x -= nx * overlap; a.y -= ny * overlap; }
        if (!b.isDragging) { b.x += nx * overlap; b.y += ny * overlap; }
        const relVx = a.vx - b.vx;
        const relVy = a.vy - b.vy;
        const dot = relVx * nx + relVy * ny;
        if (dot <= 0) continue;
        const impulse = dot * 0.6;
        if (!a.isDragging) { a.vx -= impulse * nx; a.vy -= impulse * ny; a.av += impulse * 0.025 * (Math.random()-0.5); }
        if (!b.isDragging) { b.vx += impulse * nx; b.vy += impulse * ny; b.av -= impulse * 0.025 * (Math.random()-0.5); }
      }
    }
  }
}

async function processImage(imgEl) {
  processingEl.classList.add('show');
  processingMsg.textContent = '모델 로딩 중...';

  if (!meshReady) {
    initModels();
    const ok = await waitReady(() => meshReady);
    if (!ok) {
      processingEl.classList.remove('show');
      showToast('😅 모델 로딩 실패. 다시 시도해주세요.');
      return;
    }
  }

  processingMsg.textContent = '얼굴 윤곽 따는 중...';
  const faces = await getFacePolygons(imgEl);
  processingEl.classList.remove('show');

  if (faces.length === 0) {
    showToast('😅 얼굴을 찾지 못했어요. 정면 사진을 써주세요.');
    return;
  }

  faces.forEach(face => {
    const maxH = Math.min(canvas.height * 0.28, 200);
    const scale = maxH / face.h;
    const fw = face.w * scale;
    const fh = face.h * scale;
    const x = fw / 2 + Math.random() * (canvas.width - fw);
    const y = -fh;
    objects.push(new FaceObject(face.img, x, y, fw, fh));
  });

  if (faces.length > 1) {
    showToast(`😊 얼굴 ${faces.length}개 발견!`, 'rgba(40,160,80,0.9)');
  }
}

// 갤러리
uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => processImage(img);
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  fileInput.value = '';
});

// 카메라
let stream = null;
let facingMode = 'environment';

async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false
    });
    video.srcObject = stream;
    cameraModal.classList.add('open');
  } catch {
    alert('카메라 권한이 필요해요.\n설정 > Safari > 카메라를 허용해주세요.');
  }
}

function stopCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  cameraModal.classList.remove('open');
}

cameraBtn.addEventListener('click', startCamera);
closeCamBtn.addEventListener('click', stopCamera);
switchCamBtn.addEventListener('click', () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});
shootBtn.addEventListener('click', () => {
  snapCanvas.width = video.videoWidth;
  snapCanvas.height = video.videoHeight;
  snapCanvas.getContext('2d').drawImage(video, 0, 0);
  const img = new Image();
  img.onload = () => processImage(img);
  img.src = snapCanvas.toDataURL('image/jpeg', 0.92);
  stopCamera();
});

// 흔들기
shakeBtn.addEventListener('click', () => {
  objects.forEach(o => {
    if (!o.isDragging) {
      o.vx += (Math.random() - 0.5) * 24;
      o.vy += (Math.random() - 0.75) * 20;
      o.av += (Math.random() - 0.5) * 0.4;
    }
  });
});

// 드래그 (마우스)
let dragTarget = null;
canvas.addEventListener('mousedown', (e) => {
  for (let i = objects.length - 1; i >= 0; i--) {
    if (objects[i].hitTest(e.clientX, e.clientY)) {
      dragTarget = objects[i];
      dragTarget.isDragging = true;
      dragTarget.vx = 0; dragTarget.vy = 0;
      dragTarget.lastX = e.clientX; dragTarget.lastY = e.clientY;
      break;
    }
  }
});
canvas.addEventListener('mousemove', (e) => {
  if (!dragTarget) return;
  dragTarget.vx = e.clientX - dragTarget.lastX;
  dragTarget.vy = e.clientY - dragTarget.lastY;
  dragTarget.x = e.clientX; dragTarget.y = e.clientY;
  dragTarget.lastX = e.clientX; dragTarget.lastY = e.clientY;
});
canvas.addEventListener('mouseup', () => {
  if (dragTarget) { dragTarget.isDragging = false; dragTarget = null; }
});

// 드래그 (터치)
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  for (let i = objects.length - 1; i >= 0; i--) {
    if (objects[i].hitTest(t.clientX, t.clientY)) {
      dragTarget = objects[i];
      dragTarget.isDragging = true;
      dragTarget.vx = 0; dragTarget.vy = 0;
      dragTarget.lastX = t.clientX; dragTarget.lastY = t.clientY;
      break;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!dragTarget) return;
  const t = e.touches[0];
  dragTarget.vx = t.clientX - dragTarget.lastX;
  dragTarget.vy = t.clientY - dragTarget.lastY;
  dragTarget.x = t.clientX; dragTarget.y = t.clientY;
  dragTarget.lastX = t.clientX; dragTarget.lastY = t.clientY;
}, { passive: false });

canvas.addEventListener('touchend', () => {
  if (dragTarget) { dragTarget.isDragging = false; dragTarget = null; }
});

// 게임 루프
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  resolveCollisions();
  objects.forEach(o => { o.update(); o.draw(); });
  requestAnimationFrame(loop);
}
loop();

// 미리 모델 로드
initModels();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
