<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Face Drop</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      min-height: 100vh;
      font-family: -apple-system, sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    #canvas { display: block; background: #000; }

    /* 상단 보조 버튼 */
    #topUI {
      position: fixed;
      top: 20px;
      right: 16px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    .btnSm {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      white-space: nowrap;
    }
    .btnSm:active { background: rgba(255,255,255,0.25); }

    /* 하단 패널 — 얼굴과 분리된 영역 */
    #bottomPanel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 90px;
      background: rgba(10,10,10,0.92);
      border-top: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .btnMain {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 13px 28px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, transform 0.08s;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .btnMain:active { background: rgba(255,255,255,0.25); transform: scale(0.96); }
    .btnMain:disabled { opacity: 0.3; pointer-events: none; }
    #shakeMainBtn {
      background: rgba(255,100,50,0.18);
      border-color: rgba(255,120,60,0.35);
      color: #ff9966;
    }
    #shakeMainBtn:active { background: rgba(255,100,50,0.4); }

    /* 모델 로딩 */
    #modelStatus {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: rgba(255,255,255,0.65);
      border-radius: 50px;
      padding: 8px 18px;
      font-size: 12px;
      z-index: 300;
      backdrop-filter: blur(8px);
      transition: opacity 0.6s;
      white-space: nowrap;
    }
    #queueBadge {
      display: none;
      position: fixed;
      top: 20px;
      left: 16px;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6);
      border-radius: 50px;
      padding: 7px 13px;
      font-size: 11px;
      z-index: 300;
    }
    #queueBadge.show { display: block; }

    /* 토스트 */
    #toast {
      display: none;
      position: fixed;
      bottom: 105px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30,30,30,0.9);
      color: #fff;
      border-radius: 50px;
      padding: 11px 22px;
      font-size: 13px;
      z-index: 300;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    #toast.show { display: block; }

    /* 꾹 누르기 선택 링 */
    #selectRing {
      display: none;
      position: fixed;
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 50%;
      pointer-events: none;
      z-index: 20;
      box-shadow: 0 0 12px rgba(255,255,255,0.3);
    }
    #selectRing.show { display: block; }
    #sizeHint {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      pointer-events: none;
      z-index: 21;
      text-align: center;
    }
    #sizeHint.show { display: block; }

    /* 기타 */
    #faceCounter {
      position: fixed;
      bottom: 96px;
      left: 12px;
      color: rgba(255,255,255,0.2);
      font-size: 10px;
      pointer-events: none;
      z-index: 5;
    }
    #version {
      position: fixed;
      bottom: 96px;
      right: 12px;
      color: rgba(255,255,255,0.2);
      font-size: 10px;
      pointer-events: none;
      z-index: 5;
    }

    /* 안내 화면 */
    #guide {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: #fff;
      padding: 40px;
    }
    #guide h1 { font-size: 24px; font-weight: 700; text-align: center; }
    #guide .tips {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      line-height: 2.2;
      width: 100%;
      max-width: 320px;
    }
    #startBtn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 60px;
      padding: 16px 48px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    #startBtn:active { opacity: 0.8; }

    /* 확인 모달 */
    #confirmModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 400;
      align-items: center;
      justify-content: center;
    }
    #confirmModal.show { display: flex; }
    #confirmBox {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 28px 32px;
      text-align: center;
      color: #fff;
      max-width: 280px;
      width: 90%;
    }
    #confirmBox p { font-size: 15px; margin-bottom: 20px; color: rgba(255,255,255,0.8); }
    #confirmBox .confirmBtns { display: flex; gap: 10px; justify-content: center; }
    #confirmBox button { border-radius: 50px; padding: 11px 24px; font-size: 14px; cursor: pointer; border: none; }
    #confirmYes { background: #ff4444; color: #fff; }
    #confirmNo { background: rgba(255,255,255,0.12); color: #fff; }

    /* 카메라 */
    #cameraModal {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #cameraModal.open { display: flex; }
    #video { width: 100%; max-height: 75vh; object-fit: cover; }
    #video.mirrored { transform: scaleX(-1); }
    #camControls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      align-items: center;
    }
    #shootBtn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 4px solid #fff;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
    }
    #shootBtn:active { background: rgba(255,255,255,0.6); }
    #closeCamBtn {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      padding: 12px 20px;
      font-size: 14px;
      cursor: pointer;
    }
    #fileInput, #snapCanvas { display: none; }
  </style>
</head>
<body>

<div id="guide">
  <h1>😄 Face Drop</h1>
  <div class="tips">
    ✅ 얼굴이 잘 보이는 사진<br>
    ✅ 정면 또는 약간 옆 각도<br>
    ✅ 단체사진도 OK<br>
    ✅ 꾹 누르면 크기 조절 가능
  </div>
  <button id="startBtn">시작하기</button>
</div>

<canvas id="canvas"></canvas>
<div id="version">v0.9</div>
<div id="faceCounter">얼굴 0개</div>
<div id="modelStatus">⏳ 모델 로딩 중...</div>
<div id="queueBadge"></div>
<div id="toast"></div>
<div id="selectRing"></div>
<div id="sizeHint">위아래로 드래그해서<br>크기를 조절하세요</div>

<div id="topUI">
  <button class="btnSm" id="resetBtn">🗑 초기화</button>
</div>

<!-- 하단 분리 패널 -->
<div id="bottomPanel">
  <button class="btnMain" id="cameraBtn" disabled>📷 촬영</button>
  <button class="btnMain" id="uploadBtn" disabled>🖼 갤러리</button>
  <button class="btnMain" id="shakeMainBtn">🫨 흔들기</button>
  <input type="file" id="fileInput" accept="image/*" multiple>
</div>

<div id="confirmModal">
  <div id="confirmBox">
    <p>얼굴을 모두 지울까요?</p>
    <div class="confirmBtns">
      <button id="confirmNo">취소</button>
      <button id="confirmYes">지우기</button>
    </div>
  </div>
</div>

<div id="cameraModal">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="snapCanvas"></canvas>
  <div id="camControls">
    <button id="closeCamBtn">✕ 닫기</button>
    <button id="shootBtn"></button>
    <button id="switchCamBtn" class="btnSm">🔄</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');
const cameraBtn = document.getElementById('cameraBtn');
const shakeMainBtn = document.getElementById('shakeMainBtn');
const resetBtn = document.getElementById('resetBtn');
const cameraModal = document.getElementById('cameraModal');
const video = document.getElementById('video');
const shootBtn = document.getElementById('shootBtn');
const closeCamBtn = document.getElementById('closeCamBtn');
const switchCamBtn = document.getElementById('switchCamBtn');
const snapCanvas = document.getElementById('snapCanvas');
const toastEl = document.getElementById('toast');
const guide = document.getElementById('guide');
const startBtn = document.getElementById('startBtn');
const modelStatus = document.getElementById('modelStatus');
const queueBadge = document.getElementById('queueBadge');
const faceCounter = document.getElementById('faceCounter');
const confirmModal = document.getElementById('confirmModal');
const confirmYes = document.getElementById('confirmYes');
const confirmNo = document.getElementById('confirmNo');
const selectRing = document.getElementById('selectRing');
const sizeHint = document.getElementById('sizeHint');

// 하단 패널 높이 — 물리 바닥선으로 사용
const PANEL_H = 90;

startBtn.addEventListener('click', () => { guide.style.display = 'none'; });

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let toastTimer = null;
function showToast(msg, color = 'rgba(30,30,30,0.9)') {
  toastEl.textContent = msg;
  toastEl.style.background = color;
  toastEl.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
}

// 모델 로딩
const MODEL_URL = '/photo-drop-game';
let modelsLoaded = false;

async function loadModels() {
  if (modelsLoaded) return true;
  try {
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL),
    ]);
    modelsLoaded = true;
    modelStatus.textContent = '✅ 준비됐어요';
    setTimeout(() => { modelStatus.style.opacity = '0'; }, 1500);
    uploadBtn.disabled = false;
    cameraBtn.disabled = false;
    return true;
  } catch(e) {
    modelStatus.textContent = '❌ 모델 로딩 실패 — 새로고침해주세요';
    return false;
  }
}

// 큐
const queue = [];
let isProcessing = false;

function updateQueueBadge() {
  if (queue.length === 0) { queueBadge.classList.remove('show'); return; }
  queueBadge.textContent = `⏳ ${queue.length}장 처리 중`;
  queueBadge.classList.add('show');
}

async function enqueue(imgEl) {
  queue.push(imgEl);
  updateQueueBadge();
  if (!isProcessing) processQueue();
}

async function processQueue() {
  if (queue.length === 0) { isProcessing = false; updateQueueBadge(); return; }
  isProcessing = true;
  const img = queue.shift();
  updateQueueBadge();
  await processImage(img);
  processQueue();
}

// 베지어 곡선 윤곽
function drawSmoothContour(ctx, points) {
  if (points.length < 3) return;
  ctx.beginPath();
  ctx.moveTo((points[0].x + points[1].x) / 2, (points[0].y + points[1].y) / 2);
  for (let i = 1; i < points.length - 1; i++) {
    const mx = (points[i].x + points[i+1].x) / 2;
    const my = (points[i].y + points[i+1].y) / 2;
    ctx.quadraticCurveTo(points[i].x, points[i].y, mx, my);
  }
  ctx.quadraticCurveTo(
    points[points.length-1].x, points[points.length-1].y,
    (points[points.length-1].x + points[0].x) / 2,
    (points[points.length-1].y + points[0].y) / 2
  );
  ctx.closePath();
}

async function detectAndCropFaces(imgEl) {
  const iw = imgEl.naturalWidth || imgEl.width;
  const ih = imgEl.naturalHeight || imgEl.height;

  let detectTarget = imgEl;
  const maxDetectSize = 800;
  let scaleRatio = 1;
  if (iw > maxDetectSize || ih > maxDetectSize) {
    scaleRatio = maxDetectSize / Math.max(iw, ih);
    const rc = document.createElement('canvas');
    rc.width = Math.round(iw * scaleRatio);
    rc.height = Math.round(ih * scaleRatio);
    rc.getContext('2d').drawImage(imgEl, 0, 0, rc.width, rc.height);
    detectTarget = rc;
  }

  const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.3 });
  const detections = await faceapi.detectAllFaces(detectTarget, options).withFaceLandmarks(true);
  if (!detections || detections.length === 0) return [];

  const results = [];

  detections.forEach(det => {
    const allPoints = det.landmarks.positions.map(p => ({ x: p.x / scaleRatio, y: p.y / scaleRatio }));
    const box = det.detection.box;
    const boxH = box.height / scaleRatio;

    // 얼굴 크기 아주 약간 증가 (max 0.38)
    const faceRatio = boxH / ih;
    const minScreenRatio = 0.09;
    const maxScreenRatio = 0.38;
    const clampedRatio = Math.max(0.05, Math.min(0.8, faceRatio));
    const t = (clampedRatio - 0.05) / (0.8 - 0.05);
    const screenRatio = minScreenRatio + t * (maxScreenRatio - minScreenRatio);
    // 바닥 패널 제외한 영역 기준
    const availH = canvas.height - PANEL_H;
    const targetH_px = availH * screenRatio;

    const jaw = allPoints.slice(0, 17);
    const leftBrow = allPoints.slice(17, 22);
    const rightBrow = allPoints.slice(22, 27);

    const browTopY = Math.min(...leftBrow.map(p => p.y), ...rightBrow.map(p => p.y));
    const chinY = Math.max(...jaw.map(p => p.y));
    const foreheadOffset = (chinY - browTopY) * 0.5;
    const foreheadY = browTopY - foreheadOffset;

    const leftTemple = { x: jaw[0].x - (jaw[2].x - jaw[0].x) * 0.1, y: foreheadY + foreheadOffset * 0.2 };
    const rightTemple = { x: jaw[16].x + (jaw[16].x - jaw[14].x) * 0.1, y: foreheadY + foreheadOffset * 0.2 };
    const topCenter = { x: (jaw[0].x + jaw[16].x) / 2, y: foreheadY };

    const contour = [jaw[0], leftTemple, topCenter, rightTemple, jaw[16], ...jaw.slice(1, 16).reverse()];

    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    contour.forEach(p => {
      minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
    });

    const padX = (maxX - minX) * 0.06;
    const padY = (maxY - minY) * 0.06;
    minX = Math.max(0, minX - padX); minY = Math.max(0, minY - padY);
    maxX = Math.min(iw, maxX + padX); maxY = Math.min(ih, maxY + padY);

    const cropW = maxX - minX;
    const cropH = maxY - minY;
    const fc = document.createElement('canvas');
    fc.width = Math.round(cropW);
    fc.height = Math.round(cropH);
    const fctx = fc.getContext('2d');

    const localContour = contour.map(p => ({ x: p.x - minX, y: p.y - minY }));
    fctx.save();
    drawSmoothContour(fctx, localContour);
    fctx.clip();
    fctx.drawImage(imgEl, minX, minY, cropW, cropH, 0, 0, fc.width, fc.height);
    fctx.restore();

    const imgData = fctx.getImageData(0, 0, fc.width, fc.height);
    const d = imgData.data;
    const fadeW = 16;
    for (let py = 0; py < fc.height; py++) {
      for (let px = 0; px < fc.width; px++) {
        const idx = (py * fc.width + px) * 4;
        if (d[idx + 3] === 0) continue;
        const edgeDist = Math.min(px, py, fc.width - 1 - px, fc.height - 1 - py);
        if (edgeDist < fadeW) {
          const tt = edgeDist / fadeW;
          d[idx + 3] = Math.round(d[idx + 3] * tt * tt);
        }
      }
    }
    fctx.putImageData(imgData, 0, 0);

    const faceImg = new Image();
    faceImg.src = fc.toDataURL('image/png');
    results.push({ img: faceImg, cropW, cropH, targetH: targetH_px });
  });

  await Promise.all(results.map(r => new Promise(res => {
    if (r.img.complete) res(); else r.img.onload = res;
  })));

  return results;
}

// 물리
const GRAVITY = 0.52;
const FLOOR_FRICTION = 0.72;
const BOUNCE = 0.28;
const AIR_FRICTION = 0.996;
const ANGULAR_DAMP = 0.83;

const objects = [];

function updateFaceCounter() {
  faceCounter.textContent = `얼굴 ${objects.length}개`;
}

// 크기 조절 상태
let selectedObj = null;
let resizeStartY = 0;
let resizeStartW = 0;
let resizeStartH = 0;

function updateSelectRing(obj) {
  if (!obj) { selectRing.classList.remove('show'); sizeHint.classList.remove('show'); return; }
  const r = Math.max(obj.rx, obj.ry);
  selectRing.style.left = (obj.x - r - 4) + 'px';
  selectRing.style.top = (obj.y - r - 4) + 'px';
  selectRing.style.width = (r * 2 + 8) + 'px';
  selectRing.style.height = (r * 2 + 8) + 'px';
  selectRing.classList.add('show');
  sizeHint.classList.add('show');
}

class FaceObject {
  constructor(img, x, y, w, h) {
    this.img = img;
    this.x = x; this.y = y;
    this.w = w; this.h = h;
    this.vx = (Math.random() - 0.5) * 5;
    this.vy = 0;
    this.angle = (Math.random() - 0.5) * 0.15;
    this.av = (Math.random() - 0.5) * 0.025;
    this.isDragging = false;
    this.lastX = x; this.lastY = y;
    this.rx = w * 0.44;
    this.ry = h * 0.44;
    this.r = Math.min(this.rx, this.ry);
  }

  setSize(w, h) {
    this.w = w; this.h = h;
    this.rx = w * 0.44;
    this.ry = h * 0.44;
    this.r = Math.min(this.rx, this.ry);
  }

  update() {
    if (this.isDragging || this === selectedObj) return;
    this.vy += GRAVITY;
    this.vx *= AIR_FRICTION;
    this.x += this.vx; this.y += this.vy;
    this.angle += this.av;
    this.av *= ANGULAR_DAMP;

    // 바닥 = 화면 높이 - 패널 높이
    const floor = canvas.height - PANEL_H - this.ry;
    if (this.y >= floor) {
      this.y = floor; this.vy *= -BOUNCE;
      this.vx *= FLOOR_FRICTION; this.av *= FLOOR_FRICTION;
      if (Math.abs(this.vy) < 1.0) this.vy = 0;
    }
    if (this.x - this.rx <= 0) { this.x = this.rx; this.vx = Math.abs(this.vx) * BOUNCE; this.av *= -0.4; }
    if (this.x + this.rx >= canvas.width) { this.x = canvas.width - this.rx; this.vx = -Math.abs(this.vx) * BOUNCE; this.av *= -0.4; }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    if (this === selectedObj) {
      ctx.globalAlpha = 0.85;
    }
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 14;
    ctx.shadowOffsetY = 6;
    ctx.drawImage(this.img, -this.w / 2, -this.h / 2, this.w, this.h);
    ctx.restore();
  }

  hitTest(px, py) {
    const dx = (px - this.x) / this.rx;
    const dy = (py - this.y) / this.ry;
    return dx * dx + dy * dy <= 1;
  }
}

function resolveCollisions() {
  for (let iter = 0; iter < 3; iter++) {
    for (let i = 0; i < objects.length; i++) {
      for (let j = i + 1; j < objects.length; j++) {
        const a = objects[i], b = objects[j];
        if (a === selectedObj || b === selectedObj) continue;
        const dx = b.x - a.x, dy = b.y - a.y;
        const distSq = dx*dx + dy*dy;
        const minDist = a.r + b.r;
        if (distSq >= minDist*minDist || distSq < 0.01) continue;
        const dist = Math.sqrt(distSq);
        const nx = dx/dist, ny = dy/dist;
        const overlap = (minDist - dist) * 0.5;
        if (!a.isDragging) { a.x -= nx*overlap; a.y -= ny*overlap; }
        if (!b.isDragging) { b.x += nx*overlap; b.y += ny*overlap; }
        const dot = (a.vx-b.vx)*nx + (a.vy-b.vy)*ny;
        if (dot <= 0) continue;
        const imp = dot * 0.6;
        if (!a.isDragging) { a.vx -= imp*nx; a.vy -= imp*ny; a.av += imp*0.025*(Math.random()-0.5); }
        if (!b.isDragging) { b.vx += imp*nx; b.vy += imp*ny; b.av -= imp*0.025*(Math.random()-0.5); }
      }
    }
  }
}

async function processImage(imgEl) {
  const faces = await detectAndCropFaces(imgEl);
  if (faces.length === 0) { showToast('😅 얼굴을 찾지 못했어요'); return; }
  faces.forEach(face => {
    const scale = face.targetH / face.cropH;
    const fw = face.cropW * scale;
    const fh = face.targetH;
    const x = fw / 2 + Math.random() * (canvas.width - fw);
    objects.push(new FaceObject(face.img, x, -fh, fw, fh));
  });
  updateFaceCounter();
  if (faces.length > 1) showToast(`😊 얼굴 ${faces.length}개 발견!`, 'rgba(40,140,70,0.9)');
}

// 갤러리
uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => enqueue(img);
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  fileInput.value = '';
});

// 카메라
let stream = null;
let facingMode = 'environment';

async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false
    });
    video.srcObject = stream;
    video.classList.toggle('mirrored', facingMode === 'user');
    cameraModal.classList.add('open');
  } catch {
    alert('카메라 권한이 필요해요.\n설정 > Safari > 카메라를 허용해주세요.');
  }
}

function stopCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  cameraModal.classList.remove('open');
}

cameraBtn.addEventListener('click', startCamera);
closeCamBtn.addEventListener('click', stopCamera);
switchCamBtn.addEventListener('click', () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});
shootBtn.addEventListener('click', () => {
  const vw = video.videoWidth, vh = video.videoHeight;
  snapCanvas.width = vw; snapCanvas.height = vh;
  const sctx = snapCanvas.getContext('2d');
  if (facingMode === 'user') { sctx.translate(vw, 0); sctx.scale(-1, 1); }
  sctx.drawImage(video, 0, 0);
  const img = new Image();
  img.onload = () => enqueue(img);
  img.src = snapCanvas.toDataURL('image/jpeg', 0.92);
  stopCamera();
});

// 흔들기
shakeMainBtn.addEventListener('click', () => {
  objects.forEach(o => {
    if (!o.isDragging && o !== selectedObj) {
      o.vx += (Math.random() - 0.5) * 24;
      o.vy += (Math.random() - 0.75) * 20;
      o.av += (Math.random() - 0.5) * 0.4;
    }
  });
});

// 초기화
resetBtn.addEventListener('click', () => confirmModal.classList.add('show'));
confirmNo.addEventListener('click', () => confirmModal.classList.remove('show'));
confirmYes.addEventListener('click', () => {
  objects.length = 0;
  selectedObj = null;
  updateSelectRing(null);
  updateFaceCounter();
  confirmModal.classList.remove('show');
  showToast('🗑 초기화됐어요');
});

// 입력 처리 통합 (마우스 + 터치)
let dragTarget = null;
let longPressTimer = null;
let isResizing = false;
let inputStartX = 0, inputStartY = 0;
let inputMoved = false;

function getPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function onInputStart(e) {
  const { x, y } = getPos(e);
  inputStartX = x; inputStartY = y;
  inputMoved = false;

  // 패널 영역 클릭은 무시
  if (y > canvas.height - PANEL_H) return;

  // 선택된 객체가 있고 다른 곳 탭하면 해제
  if (selectedObj && !selectedObj.hitTest(x, y)) {
    selectedObj.vx = 0; selectedObj.vy = 0;
    selectedObj = null;
    updateSelectRing(null);
    return;
  }

  // 선택된 객체 위에서 드래그 → 크기 조절
  if (selectedObj && selectedObj.hitTest(x, y)) {
    isResizing = true;
    resizeStartY = y;
    resizeStartW = selectedObj.w;
    resizeStartH = selectedObj.h;
    return;
  }

  // 일반 드래그 or 꾹 누르기
  for (let i = objects.length - 1; i >= 0; i--) {
    if (objects[i].hitTest(x, y)) {
      dragTarget = objects[i];
      dragTarget.isDragging = true;
      dragTarget.vx = 0; dragTarget.vy = 0;
      dragTarget.lastX = x; dragTarget.lastY = y;

      // 꾹 누르기 타이머 (0.6초)
      longPressTimer = setTimeout(() => {
        if (!inputMoved && dragTarget) {
          selectedObj = dragTarget;
          dragTarget.isDragging = false;
          dragTarget = null;
          isResizing = true;
          resizeStartY = y;
          resizeStartW = selectedObj.w;
          resizeStartH = selectedObj.h;
          updateSelectRing(selectedObj);
          sizeHint.classList.add('show');
          setTimeout(() => sizeHint.classList.remove('show'), 1800);
        }
      }, 600);
      break;
    }
  }
}

function onInputMove(e) {
  if (e.cancelable) e.preventDefault();
  const { x, y } = getPos(e);
  const dx = Math.abs(x - inputStartX) + Math.abs(y - inputStartY);
  if (dx > 8) inputMoved = true;

  if (isResizing && selectedObj) {
    const dy = y - resizeStartY;
    const scale = 1 - dy / 200;
    const newH = Math.max(40, Math.min(canvas.height * 0.6, resizeStartH * scale));
    const newW = resizeStartW * (newH / resizeStartH);
    selectedObj.setSize(newW, newH);
    updateSelectRing(selectedObj);
    return;
  }

  if (!dragTarget) return;
  dragTarget.vx = x - dragTarget.lastX;
  dragTarget.vy = y - dragTarget.lastY;
  dragTarget.x = x; dragTarget.y = y;
  dragTarget.lastX = x; dragTarget.lastY = y;
}

function onInputEnd() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  isResizing = false;
  if (dragTarget) { dragTarget.isDragging = false; dragTarget = null; }
}

canvas.addEventListener('mousedown', onInputStart);
canvas.addEventListener('mousemove', onInputMove);
canvas.addEventListener('mouseup', onInputEnd);
canvas.addEventListener('touchstart', onInputStart, { passive: false });
canvas.addEventListener('touchmove', onInputMove, { passive: false });
canvas.addEventListener('touchend', onInputEnd);

// 게임 루프
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  resolveCollisions();
  objects.forEach(o => { o.update(); o.draw(); });
  if (selectedObj) updateSelectRing(selectedObj);
  requestAnimationFrame(loop);
}
loop();

loadModels();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
