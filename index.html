<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Face Drop</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      min-height: 100vh;
      font-family: sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    #canvas { display: block; background: #000; }

    /* 하단 UI */
    #ui {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
      align-items: center;
    }
    .btn {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 50px;
      padding: 12px 22px;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      white-space: nowrap;
      transition: background 0.12s;
    }
    .btn:active { background: rgba(255,255,255,0.3); }
    #shakeBtn {
      background: rgba(255,100,50,0.18);
      border-color: rgba(255,120,60,0.5);
      color: #ff9966;
    }
    #shakeBtn:active { background: rgba(255,100,50,0.45); }

    /* 처리중 오버레이 */
    #processing {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: #fff;
      font-size: 15px;
    }
    #processing.show { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 토스트 메시지 */
    #toast {
      display: none;
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(220,60,60,0.9);
      color: #fff;
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 14px;
      z-index: 300;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    #toast.show { display: block; }

    /* 안내 화면 */
    #guide {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: #fff;
      padding: 40px;
    }
    #guide h1 { font-size: 22px; font-weight: 600; text-align: center; }
    #guide p { font-size: 14px; color: rgba(255,255,255,0.6); text-align: center; line-height: 1.8; }
    #guide .tips {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      line-height: 2;
      width: 100%;
      max-width: 320px;
    }
    #startBtn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 50px;
      padding: 16px 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    #startBtn:active { opacity: 0.8; }

    /* 카메라 모달 */
    #cameraModal {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #cameraModal.open { display: flex; }
    #video { width: 100%; max-height: 75vh; object-fit: cover; }
    #camControls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      align-items: center;
    }
    #shootBtn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 4px solid #fff;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
    }
    #shootBtn:active { background: rgba(255,255,255,0.6); }
    #closeCamBtn {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 50px;
      padding: 12px 22px;
      font-size: 14px;
      cursor: pointer;
    }
    #fileInput, #snapCanvas, #offCanvas { display: none; }
  </style>
</head>
<body>

<!-- 안내 화면 -->
<div id="guide">
  <h1>😄 Face Drop</h1>
  <p>사진에서 얼굴을 자동으로 찾아<br>하늘에서 떨어뜨려요</p>
  <div class="tips">
    ✅ 얼굴이 크고 선명한 사진<br>
    ✅ 정면 또는 약간 옆 각도<br>
    ✅ 밝은 조명<br>
    ✅ 여러 명이면 각각 따로 떨어져요
  </div>
  <button id="startBtn">시작하기</button>
</div>

<canvas id="canvas"></canvas>
<canvas id="offCanvas"></canvas>

<div id="processing">
  <div class="spinner"></div>
  <span id="processingMsg">얼굴 찾는 중...</span>
</div>

<div id="toast"></div>

<div id="ui">
  <button class="btn" id="cameraBtn">📷 촬영</button>
  <button class="btn" id="uploadBtn">🖼 갤러리</button>
  <button class="btn" id="shakeBtn">🫨 흔들기</button>
  <input type="file" id="fileInput" accept="image/*" multiple>
</div>

<div id="cameraModal">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="snapCanvas"></canvas>
  <div id="camControls">
    <button id="closeCamBtn">✕ 닫기</button>
    <button id="shootBtn"></button>
    <button id="switchCamBtn" class="btn" style="padding:12px 18px;">🔄</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const offCanvas = document.getElementById('offCanvas');
const offCtx = offCanvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');
const cameraBtn = document.getElementById('cameraBtn');
const shakeBtn = document.getElementById('shakeBtn');
const cameraModal = document.getElementById('cameraModal');
const video = document.getElementById('video');
const shootBtn = document.getElementById('shootBtn');
const closeCamBtn = document.getElementById('closeCamBtn');
const switchCamBtn = document.getElementById('switchCamBtn');
const snapCanvas = document.getElementById('snapCanvas');
const processingEl = document.getElementById('processing');
const processingMsg = document.getElementById('processingMsg');
const toastEl = document.getElementById('toast');
const guide = document.getElementById('guide');
const startBtn = document.getElementById('startBtn');

// 안내 화면 닫기
startBtn.addEventListener('click', () => {
  guide.style.display = 'none';
});

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 토스트 메시지
let toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
}

// MediaPipe Face Detection
let faceDetector = null;
let detectorReady = false;

function initDetector() {
  if (detectorReady || typeof FaceDetection === 'undefined') return;
  try {
    faceDetector = new FaceDetection({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${f}`
    });
    faceDetector.setOptions({
      model: 'short',       // 근거리 얼굴 모델 (빠름)
      minDetectionConfidence: 0.5
    });
    faceDetector.initialize().then(() => {
      detectorReady = true;
    }).catch(() => { detectorReady = false; });
  } catch(e) { detectorReady = false; }
}

// 얼굴 감지 + 각 얼굴 누끼 크롭
async function detectAndCropFaces(imgEl) {
  if (!detectorReady || !faceDetector) return [];

  return new Promise((resolve) => {
    const timeout = setTimeout(() => resolve([]), 5000);

    faceDetector.onResults((results) => {
      clearTimeout(timeout);
      if (!results.detections || results.detections.length === 0) {
        resolve([]);
        return;
      }

      const faces = [];
      const iw = imgEl.naturalWidth || imgEl.width;
      const ih = imgEl.naturalHeight || imgEl.height;

      results.detections.forEach(det => {
        const box = det.boundingBox;
        // 박스 좌표 (0~1 정규화 → 픽셀)
        let x = box.xCenter * iw - (box.width * iw) / 2;
        let y = box.yCenter * ih - (box.height * ih) / 2;
        let w = box.width * iw;
        let h = box.height * ih;

        // 여백 20% 추가 (머리카락·턱 포함)
        const padX = w * 0.25;
        const padY = h * 0.3;
        x = Math.max(0, x - padX);
        y = Math.max(0, y - padY);
        w = Math.min(iw - x, w + padX * 2);
        h = Math.min(ih - y, h + padY * 2);

        // 얼굴 크롭 캔버스
        const fc = document.createElement('canvas');
        fc.width = Math.round(w);
        fc.height = Math.round(h);
        const fctx = fc.getContext('2d');

        // 타원 마스크 클리핑 (얼굴 윤곽)
        fctx.save();
        fctx.beginPath();
        fctx.ellipse(
          fc.width / 2, fc.height / 2,
          fc.width / 2, fc.height / 2,
          0, 0, Math.PI * 2
        );
        fctx.closePath();
        fctx.clip();
        fctx.drawImage(imgEl, x, y, w, h, 0, 0, fc.width, fc.height);
        fctx.restore();

        // 엣지 페이더 (경계 부드럽게)
        const imgData = fctx.getImageData(0, 0, fc.width, fc.height);
        const d = imgData.data;
        const cx = fc.width / 2;
        const cy = fc.height / 2;
        const rx = fc.width / 2;
        const ry = fc.height / 2;
        const fadeZone = 0.12; // 외곽 12% 페이드

        for (let py = 0; py < fc.height; py++) {
          for (let px = 0; px < fc.width; px++) {
            const idx = (py * fc.width + px) * 4;
            const ex = (px - cx) / rx;
            const ey = (py - cy) / ry;
            const dist = Math.sqrt(ex * ex + ey * ey);
            if (dist >= 1) {
              d[idx + 3] = 0;
            } else if (dist > 1 - fadeZone) {
              const fade = (1 - dist) / fadeZone;
              d[idx + 3] = Math.round(d[idx + 3] * fade);
            }
          }
        }
        fctx.putImageData(imgData, 0, 0);

        const faceImg = new Image();
        faceImg.src = fc.toDataURL('image/png');
        faces.push({ img: faceImg, w: fc.width, h: fc.height });
      });

      // 모든 이미지 로드 대기
      Promise.all(faces.map(f => new Promise(res => {
        if (f.img.complete) res();
        else f.img.onload = res;
      }))).then(() => resolve(faces));
    });

    faceDetector.send({ image: imgEl }).catch(() => {
      clearTimeout(timeout);
      resolve([]);
    });
  });
}

// 물리 상수
const GRAVITY = 0.52;
const FLOOR_FRICTION = 0.72;
const BOUNCE = 0.28;
const AIR_FRICTION = 0.996;
const ANGULAR_DAMP = 0.83;

const objects = [];

class FaceObject {
  constructor(img, x, y, w, h) {
    this.img = img;
    this.x = x;
    this.y = y;
    this.w = w;
    this.h = h;
    this.vx = (Math.random() - 0.5) * 5;
    this.vy = 0;
    this.angle = (Math.random() - 0.5) * 0.15;
    this.av = (Math.random() - 0.5) * 0.025;
    this.isDragging = false;
    this.lastX = x;
    this.lastY = y;
    // 타원 충돌체 (얼굴 모양)
    this.rx = w * 0.46; // 가로 반지름
    this.ry = h * 0.46; // 세로 반지름
    this.r = Math.min(this.rx, this.ry); // 충돌 계산용 근사 반지름
  }

  update() {
    if (this.isDragging) return;
    this.vy += GRAVITY;
    this.vx *= AIR_FRICTION;
    this.x += this.vx;
    this.y += this.vy;
    this.angle += this.av;
    this.av *= ANGULAR_DAMP;

    // 바닥
    const floor = canvas.height - this.ry;
    if (this.y >= floor) {
      this.y = floor;
      this.vy *= -BOUNCE;
      this.vx *= FLOOR_FRICTION;
      this.av *= FLOOR_FRICTION;
      if (Math.abs(this.vy) < 1.0) this.vy = 0;
    }
    // 왼쪽 벽
    if (this.x - this.rx <= 0) {
      this.x = this.rx;
      this.vx = Math.abs(this.vx) * BOUNCE;
      this.av *= -0.4;
    }
    // 오른쪽 벽
    if (this.x + this.rx >= canvas.width) {
      this.x = canvas.width - this.rx;
      this.vx = -Math.abs(this.vx) * BOUNCE;
      this.av *= -0.4;
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 14;
    ctx.shadowOffsetY = 6;
    ctx.drawImage(this.img, -this.w / 2, -this.h / 2, this.w, this.h);
    ctx.restore();
  }

  hitTest(px, py) {
    // 타원 히트 테스트
    const dx = (px - this.x) / this.rx;
    const dy = (py - this.y) / this.ry;
    return dx * dx + dy * dy <= 1;
  }
}

// 충돌 처리
function resolveCollisions() {
  for (let iter = 0; iter < 3; iter++) {
    for (let i = 0; i < objects.length; i++) {
      for (let j = i + 1; j < objects.length; j++) {
        const a = objects[i];
        const b = objects[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const distSq = dx * dx + dy * dy;
        const minDist = a.r + b.r;
        if (distSq >= minDist * minDist || distSq < 0.01) continue;
        const dist = Math.sqrt(distSq);
        const nx = dx / dist;
        const ny = dy / dist;
        const overlap = (minDist - dist) * 0.5;
        if (!a.isDragging) { a.x -= nx * overlap; a.y -= ny * overlap; }
        if (!b.isDragging) { b.x += nx * overlap; b.y += ny * overlap; }
        const relVx = a.vx - b.vx;
        const relVy = a.vy - b.vy;
        const dot = relVx * nx + relVy * ny;
        if (dot <= 0) continue;
        const impulse = dot * 0.6;
        if (!a.isDragging) { a.vx -= impulse * nx; a.vy -= impulse * ny; a.av += impulse * 0.025 * (Math.random()-0.5); }
        if (!b.isDragging) { b.vx += impulse * nx; b.vy += impulse * ny; b.av -= impulse * 0.025 * (Math.random()-0.5); }
      }
    }
  }
}

// 사진 처리 메인
async function processImage(imgEl) {
  processingEl.classList.add('show');
  processingMsg.textContent = '얼굴 찾는 중...';

  if (!detectorReady) {
    processingMsg.textContent = '모델 로딩 중...';
    initDetector();
    await new Promise(resolve => {
      const check = setInterval(() => {
        if (detectorReady) { clearInterval(check); resolve(); }
      }, 200);
      setTimeout(() => { clearInterval(check); resolve(); }, 6000);
    });
  }

  processingMsg.textContent = '얼굴 누끼 따는 중...';
  const faces = await detectAndCropFaces(imgEl);
  processingEl.classList.remove('show');

  if (faces.length === 0) {
    showToast('😅 얼굴을 찾지 못했어요. 다른 사진을 써주세요.');
    return;
  }

  // 각 얼굴을 화면 크기에 맞게 조절 후 떨어뜨림
  faces.forEach(face => {
    const maxH = Math.min(canvas.height * 0.28, 200);
    const scale = maxH / face.h;
    const fw = face.w * scale;
    const fh = face.h * scale;
    const x = fw / 2 + Math.random() * (canvas.width - fw);
    const y = -fh;
    objects.push(new FaceObject(face.img, x, y, fw, fh));
  });

  if (faces.length > 1) {
    showToast(`😊 얼굴 ${faces.length}개 발견!`);
  }
}

// 갤러리
uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => processImage(img);
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  fileInput.value = '';
});

// 카메라
let stream = null;
let facingMode = 'environment';

async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false
    });
    video.srcObject = stream;
    cameraModal.classList.add('open');
  } catch {
    alert('카메라 권한이 필요해요.\n설정 > Safari > 카메라를 허용해주세요.');
  }
}

function stopCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  cameraModal.classList.remove('open');
}

cameraBtn.addEventListener('click', startCamera);
closeCamBtn.addEventListener('click', stopCamera);
switchCamBtn.addEventListener('click', () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});
shootBtn.addEventListener('click', () => {
  snapCanvas.width = video.videoWidth;
  snapCanvas.height = video.videoHeight;
  snapCanvas.getContext('2d').drawImage(video, 0, 0);
  const img = new Image();
  img.onload = () => processImage(img);
  img.src = snapCanvas.toDataURL('image/jpeg', 0.92);
  stopCamera();
});

// 흔들기
shakeBtn.addEventListener('click', () => {
  objects.forEach(o => {
    if (!o.isDragging) {
      o.vx += (Math.random() - 0.5) * 24;
      o.vy += (Math.random() - 0.75) * 20;
      o.av += (Math.random() - 0.5) * 0.4;
    }
  });
});

// 드래그 (마우스)
let dragTarget = null;
canvas.addEventListener('mousedown', (e) => {
  for (let i = objects.length - 1; i >= 0; i--) {
    if (objects[i].hitTest(e.clientX, e.clientY)) {
      dragTarget = objects[i];
      dragTarget.isDragging = true;
      dragTarget.vx = 0; dragTarget.vy = 0;
      dragTarget.lastX = e.clientX; dragTarget.lastY = e.clientY;
      break;
    }
  }
});
canvas.addEventListener('mousemove', (e) => {
  if (!dragTarget) return;
  dragTarget.vx = e.clientX - dragTarget.lastX;
  dragTarget.vy = e.clientY - dragTarget.lastY;
  dragTarget.x = e.clientX; dragTarget.y = e.clientY;
  dragTarget.lastX = e.clientX; dragTarget.lastY = e.clientY;
});
canvas.addEventListener('mouseup', () => {
  if (dragTarget) { dragTarget.isDragging = false; dragTarget = null; }
});

// 드래그 (터치)
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  for (let i = objects.length - 1; i >= 0; i--) {
    if (objects[i].hitTest(t.clientX, t.clientY)) {
      dragTarget = objects[i];
      dragTarget.isDragging = true;
      dragTarget.vx = 0; dragTarget.vy = 0;
      dragTarget.lastX = t.clientX; dragTarget.lastY = t.clientY;
      break;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!dragTarget) return;
  const t = e.touches[0];
  dragTarget.vx = t.clientX - dragTarget.lastX;
  dragTarget.vy = t.clientY - dragTarget.lastY;
  dragTarget.x = t.clientX; dragTarget.y = t.clientY;
  dragTarget.lastX = t.clientX; dragTarget.lastY = t.clientY;
}, { passive: false });

canvas.addEventListener('touchend', () => {
  if (dragTarget) { dragTarget.isDragging = false; dragTarget = null; }
});

// 게임 루프
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  resolveCollisions();
  objects.forEach(o => { o.update(); o.draw(); });
  requestAnimationFrame(loop);
}
loop();

// 미리 모델 로드
initDetector();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
