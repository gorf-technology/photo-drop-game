<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Photo Drop</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    #canvas {
      display: block;
      background: #000;
      cursor: crosshair;
    }
    #ui {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }
    #uploadBtn {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 50px;
      padding: 12px 28px;
      font-size: 15px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.2s;
    }
    #uploadBtn:active { background: rgba(255,255,255,0.3); }
    #fileInput { display: none; }
    #hint {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<p id="hint">사진을 추가하면 위에서 떨어집니다</p>
<canvas id="canvas"></canvas>
<div id="ui">
  <button id="uploadBtn">+ 사진 추가</button>
  <input type="file" id="fileInput" accept="image/*" multiple>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');

// 캔버스 크기 = 화면 크기
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 물리 객체 배열
const objects = [];

// 물리 상수
const GRAVITY = 0.4;
const FRICTION = 0.85;
const BOUNCE = 0.3;

class PhotoObject {
  constructor(img, x, y, w, h) {
    this.img = img;
    this.x = x;
    this.y = y;
    this.w = w;
    this.h = h;
    this.vx = (Math.random() - 0.5) * 4;
    this.vy = 0;
    this.rotation = (Math.random() - 0.5) * 0.3;
    this.angularVelocity = (Math.random() - 0.5) * 0.05;
    this.isDragging = false;
    this.dragOffsetX = 0;
    this.dragOffsetY = 0;
    this.lastX = x;
    this.lastY = y;
  }

  update() {
    if (this.isDragging) return;

    this.vy += GRAVITY;
    this.x += this.vx;
    this.y += this.vy;
    this.rotation += this.angularVelocity;

    // 바닥 충돌
    const floor = canvas.height - this.h / 2;
    if (this.y > floor) {
      this.y = floor;
      this.vy *= -BOUNCE;
      this.vx *= FRICTION;
      this.angularVelocity *= FRICTION;
      if (Math.abs(this.vy) < 1) this.vy = 0;
    }

    // 좌우 벽 충돌
    const left = this.w / 2;
    const right = canvas.width - this.w / 2;
    if (this.x < left) { this.x = left; this.vx *= -BOUNCE; }
    if (this.x > right) { this.x = right; this.vx *= -BOUNCE; }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.drawImage(this.img, -this.w / 2, -this.h / 2, this.w, this.h);
    ctx.restore();
  }

  // 터치/마우스가 이 객체 위에 있는지 확인
  hitTest(px, py) {
    const dx = px - this.x;
    const dy = py - this.y;
    return Math.abs(dx) < this.w / 2 && Math.abs(dy) < this.h / 2;
  }
}

// 이미지 로드 및 객체 생성
function addPhoto(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      // 최대 크기 제한
      const maxW = Math.min(canvas.width * 0.4, 260);
      const ratio = img.height / img.width;
      const w = maxW;
      const h = maxW * ratio;

      // 상단 랜덤 위치에서 시작
      const x = w / 2 + Math.random() * (canvas.width - w);
      const y = -h;

      objects.push(new PhotoObject(img, x, y, w, h));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// 파일 선택
uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  Array.from(e.target.files).forEach(addPhoto);
  fileInput.value = '';
});

// 드래그 처리 (마우스)
let dragTarget = null;

canvas.addEventListener('mousedown', (e) => {
  const px = e.clientX;
  const py = e.clientY;
  // 위에 쌓인 것부터 (역순)
  for (let i = objects.length - 1; i >= 0; i--) {
    if (objects[i].hitTest(px, py)) {
      dragTarget = objects[i];
      dragTarget.isDragging = true;
      dragTarget.vx = 0;
      dragTarget.vy = 0;
      dragTarget.lastX = px;
      dragTarget.lastY = py;
      break;
    }
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (!dragTarget) return;
  dragTarget.vx = e.clientX - dragTarget.lastX;
  dragTarget.vy = e.clientY - dragTarget.lastY;
  dragTarget.x = e.clientX;
  dragTarget.y = e.clientY;
  dragTarget.lastX = e.clientX;
  dragTarget.lastY = e.clientY;
});

canvas.addEventListener('mouseup', () => {
  if (dragTarget) {
    dragTarget.isDragging = false;
    dragTarget = null;
  }
});

// 드래그 처리 (터치)
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const px = touch.clientX;
  const py = touch.clientY;
  for (let i = objects.length - 1; i >= 0; i--) {
    if (objects[i].hitTest(px, py)) {
      dragTarget = objects[i];
      dragTarget.isDragging = true;
      dragTarget.vx = 0;
      dragTarget.vy = 0;
      dragTarget.lastX = px;
      dragTarget.lastY = py;
      break;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!dragTarget) return;
  const touch = e.touches[0];
  dragTarget.vx = touch.clientX - dragTarget.lastX;
  dragTarget.vy = touch.clientY - dragTarget.lastY;
  dragTarget.x = touch.clientX;
  dragTarget.y = touch.clientY;
  dragTarget.lastX = touch.clientX;
  dragTarget.lastY = touch.clientY;
}, { passive: false });

canvas.addEventListener('touchend', () => {
  if (dragTarget) {
    dragTarget.isDragging = false;
    dragTarget = null;
  }
});

// 게임 루프
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  objects.forEach(obj => {
    obj.update();
    obj.draw();
  });
  requestAnimationFrame(loop);
}
loop();

// Service Worker 등록
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
