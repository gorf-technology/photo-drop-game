<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Face Drop</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      min-height: 100vh;
      font-family: -apple-system, sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    #canvas { display: block; background: #000; }
    #topUI {
      position: fixed;
      top: 20px; right: 16px;
      display: flex; gap: 8px;
      z-index: 10;
    }
    .btnSm {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 8px 14px; font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      white-space: nowrap;
    }
    .btnSm:active { background: rgba(255,255,255,0.25); }
    #bottomPanel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 90px;
      background: rgba(10,10,10,0.92);
      border-top: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 10;
      display: flex;
      align-items: center; justify-content: center;
      gap: 16px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .btnMain {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 13px 28px; font-size: 14px; font-weight: 500;
      cursor: pointer; white-space: nowrap;
      transition: background 0.12s, transform 0.08s;
      display: flex; align-items: center; gap: 7px;
    }
    .btnMain:active { background: rgba(255,255,255,0.25); transform: scale(0.96); }
    .btnMain:disabled { opacity: 0.3; pointer-events: none; }
    #shakeMainBtn {
      background: rgba(255,100,50,0.18);
      border-color: rgba(255,120,60,0.35);
      color: #ff9966;
    }
    #shakeMainBtn:active { background: rgba(255,100,50,0.4); }
    #modelStatus {
      position: fixed;
      bottom: 100px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: rgba(255,255,255,0.5);
      border-radius: 50px;
      padding: 6px 16px; font-size: 11px;
      z-index: 300;
      backdrop-filter: blur(8px);
      transition: opacity 0.8s;
      white-space: nowrap;
      pointer-events: none;
    }
    #queueBadge {
      display: none;
      position: fixed;
      top: 20px; left: 16px;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6);
      border-radius: 50px;
      padding: 7px 13px; font-size: 11px;
      z-index: 300;
    }
    #queueBadge.show { display: block; }
    #toast {
      display: none;
      position: fixed;
      bottom: 105px; left: 50%;
      transform: translateX(-50%);
      background: rgba(30,30,30,0.9);
      color: #fff; border-radius: 50px;
      padding: 11px 22px; font-size: 13px;
      z-index: 300; white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    #toast.show { display: block; }
    #faceCounter {
      position: fixed;
      bottom: 96px; left: 12px;
      color: rgba(255,255,255,0.2);
      font-size: 10px; pointer-events: none; z-index: 5;
    }
    #version {
      position: fixed;
      bottom: 96px; right: 12px;
      color: rgba(255,255,255,0.2);
      font-size: 10px; pointer-events: none; z-index: 5;
    }
    #guide {
      position: fixed; inset: 0;
      background: #000; z-index: 50;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 22px; color: #fff; padding: 40px;
    }
    #guide h1 { font-size: 26px; font-weight: 700; text-align: center; }
    #guide .sub { font-size: 14px; color: rgba(255,255,255,0.5); text-align: center; line-height: 1.8; }
    #startBtn {
      background: #fff; color: #000; border: none;
      border-radius: 60px; padding: 16px 48px;
      font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px;
    }
    #startBtn:active { opacity: 0.8; }
    #confirmModal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 400;
      align-items: center; justify-content: center;
    }
    #confirmModal.show { display: flex; }
    #confirmBox {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.15);

    #confirmBox p { font-size: 15px; margin-bottom: 20px; color: rgba(255,255,255,0.8); }
    #confirmBox .confirmBtns { display: flex; gap: 10px; justify-content: center; }
    #confirmBox button { border-radius: 50px; padding: 11px 24px; font-size: 14px; cursor: pointer; border: none; }
    #confirmYes { background: #ff4444; color: #fff; }
    #confirmNo { background: rgba(255,255,255,0.12); color: #fff; }
    #cameraModal {
      display: none; position: fixed; inset: 0;
      background: #000; z-index: 100;
      flex-direction: column; align-items: center; justify-content: center;
    }
    #cameraModal.open { display: flex; }
    #video { width: 100%; max-height: 75vh; object-fit: cover; }
    #video.mirrored { transform: scaleX(-1); }
    #camControls {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 20px; align-items: center;
    }
    #shootBtn {
      width: 72px; height: 72px; border-radius: 50%;
      border: 4px solid #fff; background: rgba(255,255,255,0.2); cursor: pointer;
    }
    #shootBtn:active { background: rgba(255,255,255,0.6); }
    #closeCamBtn {
      background: rgba(255,255,255,0.12); color: #fff;
      border: 1.5px solid rgba(255,255,255,0.3); border-radius: 50px;
      padding: 12px 20px; font-size: 14px; cursor: pointer;
    }
    #fileInput, #snapCanvas { display: none; }
  </style>

<body>

<div id="guide">
  <h1>😄 Face Drop</h1>
  <p class="sub">친구나 가족 사진을 넣어봐요<br>얼굴이 하늘에서 떨어져요</p>

</div>

<canvas id="canvas"></canvas>
<div id="version">v1.2</div>
<div id="faceCounter"></div>

<div id="topUI">

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');
const cameraBtn = document.getElementById('cameraBtn');
const shakeMainBtn = document.getElementById('shakeMainBtn');
const resetBtn = document.getElementById('resetBtn');
const cameraModal = document.getElementById('cameraModal');
const video = document.getElementById('video');
const shootBtn = document.getElementById('shootBtn');
const closeCamBtn = document.getElementById('closeCamBtn');
const switchCamBtn = document.getElementById('switchCamBtn');
const snapCanvas = document.getElementById('snapCanvas');
const toastEl = document.getElementById('toast');
const guide = document.getElementById('guide');
const startBtn = document.getElementById('startBtn');
const modelStatus = document.getElementById('modelStatus');
const queueBadge = document.getElementById('queueBadge');
const faceCounter = document.getElementById('faceCounter');
const confirmModal = document.getElementById('confirmModal');
const confirmYes = document.getElementById('confirmYes');
const confirmNo = document.getElementById('confirmNo');

const PANEL_H = 90;

startBtn.addEventListener('click', () => { guide.style.display = 'none'; });

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let toastTimer = null;
function showToast(msg, color = 'rgba(30,30,30,0.9)') {
  toastEl.textContent = msg;
  toastEl.style.background = color;
  toastEl.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
}

// 모델 로딩
const MODEL_URL = '/photo-drop-game';
let modelsLoaded = false;

async function loadModels() {
  try {
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL),
    ]);
    modelsLoaded = true;
    modelStatus.style.opacity = '0';
    setTimeout(() => { modelStatus.style.display = 'none'; }, 800);
    uploadBtn.disabled = false;
    cameraBtn.disabled = false;
  } catch(e) {
    modelStatus.textContent = '❌ 새로고침해주세요';
  }
}

// 큐
const queue = [];
let isProcessing = false;

function updateQueueBadge() {
  if (queue.length === 0) { queueBadge.classList.remove('show'); return; }
  queueBadge.textContent = `⏳ ${queue.length}장 처리 중`;
  queueBadge.classList.add('show');
}

async function enqueue(imgEl) {
  queue.push(imgEl);
  updateQueueBadge();
  if (!isProcessing) processQueue();
}

async function processQueue() {
  if (queue.length === 0) { isProcessing = false; updateQueueBadge(); return; }
  isProcessing = true;
  const img = queue.shift();
  updateQueueBadge();
  await processImage(img);
  processQueue();
}

// 베지어 곡선 윤곽
function drawSmoothContour(c, points) {
  if (points.length < 3) return;
  c.beginPath();
  c.moveTo((points[0].x + points[1].x) / 2, (points[0].y + points[1].y) / 2);
  for (let i = 1; i < points.length - 1; i++) {
    const mx = (points[i].x + points[i+1].x) / 2;
    const my = (points[i].y + points[i+1].y) / 2;
    c.quadraticCurveTo(points[i].x, points[i].y, mx, my);
  }
  c.quadraticCurveTo(
    points[points.length-1].x, points[points.length-1].y,
    (points[points.length-1].x + points[0].x) / 2,
    (points[points.length-1].y + points[0].y) / 2
  );
  c.closePath();
}

// 얼굴 감지 + 윤곽 크롭
async function detectAndCropFaces(imgEl) {
  if (!modelsLoaded) return [];
  const iw = imgEl.naturalWidth || imgEl.width;
  const ih = imgEl.naturalHeight || imgEl.height;

  let detectTarget = imgEl;
  let scaleRatio = 1;
  const maxSize = 800;
  if (iw > maxSize || ih > maxSize) {
    scaleRatio = maxSize / Math.max(iw, ih);
    const rc = document.createElement('canvas');
    rc.width = Math.round(iw * scaleRatio);
    rc.height = Math.round(ih * scaleRatio);
    rc.getContext('2d').drawImage(imgEl, 0, 0, rc.width, rc.height);
    detectTarget = rc;
  }

  const detections = await faceapi
    .detectAllFaces(detectTarget, new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.3 }))
    .withFaceLandmarks(true);

  if (!detections || detections.length === 0) return [];

  const results = [];
  const availH = canvas.height - PANEL_H;

  detections.forEach(det => {
    const allPoints = det.landmarks.positions.map(p => ({ x: p.x / scaleRatio, y: p.y / scaleRatio }));
    const boxH = det.detection.box.height / scaleRatio;
    const faceRatio = boxH / ih;
    const t = (Math.max(0.05, Math.min(0.8, faceRatio)) - 0.05) / 0.75;
    const targetH = availH * (0.09 + t * 0.29);

    const jaw = allPoints.slice(0, 17);
    const leftBrow = allPoints.slice(17, 22);
    const rightBrow = allPoints.slice(22, 27);
    const browTopY = Math.min(...leftBrow.map(p => p.y), ...rightBrow.map(p => p.y));
    const chinY = Math.max(...jaw.map(p => p.y));
    const fhOffset = (chinY - browTopY) * 0.5;
    const foreheadY = browTopY - fhOffset;

    const contour = [
      jaw[0],
      { x: jaw[0].x - (jaw[2].x - jaw[0].x) * 0.1, y: foreheadY + fhOffset * 0.2 },
      { x: (jaw[0].x + jaw[16].x) / 2, y: foreheadY },
      { x: jaw[16].x + (jaw[16].x - jaw[14].x) * 0.1, y: foreheadY + fhOffset * 0.2 },
      jaw[16],
      ...jaw.slice(1, 16).reverse()
    ];

    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    contour.forEach(p => {
      minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
    });
    const padX = (maxX - minX) * 0.06;
    const padY = (maxY - minY) * 0.06;
    minX = Math.max(0, minX - padX); minY = Math.max(0, minY - padY);
    maxX = Math.min(iw, maxX + padX); maxY = Math.min(ih, maxY + padY);

    const cropW = maxX - minX, cropH = maxY - minY;
    const fc = document.createElement('canvas');
    fc.width = Math.round(cropW); fc.height = Math.round(cropH);
    const fctx = fc.getContext('2d');
    const lc = contour.map(p => ({ x: p.x - minX, y: p.y - minY }));

    fctx.save();
    drawSmoothContour(fctx, lc);
    fctx.clip();
    fctx.drawImage(imgEl, minX, minY, cropW, cropH, 0, 0, fc.width, fc.height);
    fctx.restore();

    const id = fctx.getImageData(0, 0, fc.width, fc.height);
    const d = id.data;
    const fw = 16;
    for (let py = 0; py < fc.height; py++) {
      for (let px = 0; px < fc.width; px++) {
        const idx = (py * fc.width + px) * 4;
        if (d[idx+3] === 0) continue;
        const ed = Math.min(px, py, fc.width-1-px, fc.height-1-py);
        if (ed < fw) { const tt = ed/fw; d[idx+3] = Math.round(d[idx+3]*tt*tt); }
      }
    }
    fctx.putImageData(id, 0, 0);

    const img = new Image();
    img.src = fc.toDataURL('image/png');
    results.push({ img, cropW, cropH, targetH });
  });

  await Promise.all(results.map(r => new Promise(res => {
    if (r.img.complete) res(); else r.img.onload = res;
  })));
  return results;
}

// 일러스트 데모 얼굴
const DEMO_CONFIGS = [
  { skin: '#FDBCB4', hair: '#2C1810', expr: 'smile',  hairStyle: 'short' },
  { skin: '#F1C27D', hair: '#1a1a2e', expr: 'laugh',  hairStyle: 'long'  },
  { skin: '#C68642', hair: '#4a3728', expr: 'cool',   hairStyle: 'curly' },
  { skin: '#8D5524', hair: '#0d0d0d', expr: 'smile',  hairStyle: 'short' },
  { skin: '#FDDBB4', hair: '#d4a853', expr: 'laugh',  hairStyle: 'long'  },
];

function drawIllustFace(config, size) {
  const fc = document.createElement('canvas');
  fc.width = size; fc.height = size;
  const c = fc.getContext('2d');
  const cx = size/2, cy = size/2 + size*0.05, r = size*0.36;

  c.fillStyle = config.hair;
  if (config.hairStyle === 'long') {
    c.beginPath(); c.ellipse(cx, cy+r*0.3, r*0.85, r*1.6, 0, 0, Math.PI*2); c.fill();
  } else if (config.hairStyle === 'curly') {
    for (let i=0; i<8; i++) {
      const a=(i/8)*Math.PI*2-Math.PI/2;
      c.beginPath(); c.arc(cx+Math.cos(a)*r*0.85, cy+Math.sin(a)*r*0.7, r*0.3, 0, Math.PI*2); c.fill();
    }
  }

  c.fillStyle = config.skin;
  c.beginPath(); c.ellipse(cx, cy, r, r*1.1, 0, 0, Math.PI*2); c.fill();

  c.fillStyle = config.hair;
  if (config.hairStyle === 'short') {
    c.beginPath(); c.ellipse(cx, cy-r*0.65, r*0.9, r*0.55, 0, Math.PI, 0); c.fill();
    [-0.82, 0.82].forEach(s => { c.beginPath(); c.ellipse(cx+s*r, cy-r*0.1, r*0.22, r*0.45, s*0.3, 0, Math.PI*2); c.fill(); });
  } else if (config.hairStyle === 'long') {
    c.beginPath(); c.ellipse(cx, cy-r*0.7, r*0.92, r*0.5, 0, Math.PI, 0); c.fill();
  } else {
    c.beginPath(); c.ellipse(cx, cy-r*0.75, r*0.88, r*0.45, 0, Math.PI, 0); c.fill();
    [-1,0,1].forEach(i => { c.beginPath(); c.arc(cx+i*r*0.35, cy-r*0.72, r*0.22, 0, Math.PI*2); c.fill(); });
  }

  c.strokeStyle = config.hair; c.lineWidth = size*0.025; c.lineCap = 'round';
  [-1,1].forEach(s => {
    c.beginPath(); c.moveTo(cx+s*r*0.52, cy-r*0.28);
    c.quadraticCurveTo(cx+s*r*0.32, cy-r*0.38, cx+s*r*0.12, cy-r*0.3); c.stroke();
  });

  const eyeY = cy-r*0.08;
  [-1,1].forEach(s => {
    const ex = cx+s*r*0.33;
    c.fillStyle='#fff'; c.beginPath(); c.ellipse(ex, eyeY, r*0.17, r*0.13, 0, 0, Math.PI*2); c.fill();
    c.fillStyle='#1a1a1a'; c.beginPath(); c.arc(ex, eyeY, r*0.09, 0, Math.PI*2); c.fill();
    c.fillStyle='#fff'; c.beginPath(); c.arc(ex+r*0.04, eyeY-r*0.04, r*0.03, 0, Math.PI*2); c.fill();
    if (config.expr==='cool') {
      c.fillStyle='rgba(0,0,0,0.75)'; c.beginPath();
      c.roundRect(ex-r*0.2, eyeY-r*0.14, r*0.4, r*0.26, r*0.06); c.fill();
    }
  });
  if (config.expr==='cool') {
    c.strokeStyle='rgba(0,0,0,0.75)'; c.lineWidth=size*0.02;
    c.beginPath(); c.moveTo(cx-r*0.13, eyeY); c.lineTo(cx+r*0.13, eyeY); c.stroke();
  }

  c.strokeStyle='rgba(0,0,0,0.15)'; c.lineWidth=size*0.018;
  c.beginPath(); c.moveTo(cx-r*0.08, cy+r*0.12);
  c.quadraticCurveTo(cx-r*0.14, cy+r*0.28, cx, cy+r*0.3);
  c.quadraticCurveTo(cx+r*0.14, cy+r*0.28, cx+r*0.08, cy+r*0.12); c.stroke();

  const mY = cy+r*0.52;
  if (config.expr==='smile'||config.expr==='cool') {
    c.strokeStyle='#c0524a'; c.lineWidth=size*0.025;
    c.beginPath(); c.moveTo(cx-r*0.28, mY-r*0.05);
    c.quadraticCurveTo(cx, mY+r*0.18, cx+r*0.28, mY-r*0.05); c.stroke();
  } else {
    c.fillStyle='#c0524a';
    c.beginPath(); c.moveTo(cx-r*0.3, mY-r*0.05);
    c.quadraticCurveTo(cx, mY+r*0.25, cx+r*0.3, mY-r*0.05); c.closePath(); c.fill();
    c.fillStyle='#fff';
    c.beginPath(); c.moveTo(cx-r*0.25, mY-r*0.02); c.lineTo(cx+r*0.25, mY-r*0.02);
    c.lineTo(cx+r*0.22, mY+r*0.1); c.lineTo(cx-r*0.22, mY+r*0.1); c.closePath(); c.fill();
  }
  if (config.expr!=='cool') {
    c.fillStyle='rgba(255,160,140,0.25)';
    [-1,1].forEach(s => { c.beginPath(); c.ellipse(cx+s*r*0.56, cy+r*0.18, r*0.18, r*0.1, 0, 0, Math.PI*2); c.fill(); });
  }

  const g = c.createRadialGradient(cx, cy, r*0.7, cx, cy, r*1.1);
  g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(0,0,0,1)');
  c.globalCompositeOperation='destination-out';
  c.fillStyle=g; c.beginPath(); c.arc(cx, cy, r*1.15, 0, Math.PI*2); c.fill();
  c.globalCompositeOperation='source-over';
  return fc;
}

// 물리
const GRAVITY=0.52, FLOOR_FRICTION=0.72, BOUNCE=0.28, AIR_FRICTION=0.996, ANGULAR_DAMP=0.83;
const objects = [];

function updateFaceCounter() {
  const real = objects.filter(o => !o.isDemo).length;
  faceCounter.textContent = real > 0 ? `얼굴 ${real}개` : '';
}

class DropObject {
  constructor(img, x, y, w, h, isDemo=false) {
    this.img=img; this.x=x; this.y=y; this.w=w; this.h=h; this.isDemo=isDemo;
    this.vx=(Math.random()-0.5)*4; this.vy=0;
    this.angle=(Math.random()-0.5)*0.15; this.av=(Math.random()-0.5)*0.025;
    this.isDragging=false; this.lastX=x; this.lastY=y;
    this.rx=w*0.44; this.ry=h*0.44; this.r=Math.min(this.rx,this.ry);
    this.alpha=isDemo?0:1;
  }
  update() {
    if (this.isDragging) return;
    if (this.isDemo && this.alpha < 1) this.alpha = Math.min(1, this.alpha+0.02);
    this.vy+=GRAVITY; this.vx*=AIR_FRICTION;
    this.x+=this.vx; this.y+=this.vy;
    this.angle+=this.av; this.av*=ANGULAR_DAMP;
    const floor = canvas.height-PANEL_H-this.ry;
    if (this.y>=floor) { this.y=floor; this.vy*=-BOUNCE; this.vx*=FLOOR_FRICTION; this.av*=FLOOR_FRICTION; if(Math.abs(this.vy)<1) this.vy=0; }
    if (this.x-this.rx<=0) { this.x=this.rx; this.vx=Math.abs(this.vx)*BOUNCE; this.av*=-0.4; }
    if (this.x+this.rx>=canvas.width) { this.x=canvas.width-this.rx; this.vx=-Math.abs(this.vx)*BOUNCE; this.av*=-0.4; }
  }
  draw() {
    ctx.save(); ctx.globalAlpha=this.alpha;
    ctx.translate(this.x,this.y); ctx.rotate(this.angle);
    ctx.shadowColor='rgba(0,0,0,0.7)'; ctx.shadowBlur=14; ctx.shadowOffsetY=6;
    ctx.drawImage(this.img,-this.w/2,-this.h/2,this.w,this.h); ctx.restore();
  }
  hitTest(px,py) { const dx=(px-this.x)/this.rx, dy=(py-this.y)/this.ry; return dx*dx+dy*dy<=1; }
}

function spawnDemoFaces() {
  const availH = canvas.height - PANEL_H;
  const faceSize = Math.min(canvas.width, availH) * 0.28;
  DEMO_CONFIGS.forEach((cfg, i) => {
    const fc = drawIllustFace(cfg, Math.round(faceSize*1.4));
    const img = new Image();
    img.src = fc.toDataURL('image/png');
    setTimeout(() => {
      const x = (canvas.width/(DEMO_CONFIGS.length+1))*(i+1);
      const obj = new DropObject(img, x, -faceSize*0.6, faceSize, faceSize, true);
      obj.vx = (Math.random()-0.5)*3;
      objects.push(obj);
    }, i*400);
  });
}

function resolveCollisions() {
  for (let iter=0; iter<3; iter++) {
    for (let i=0; i<objects.length; i++) {
      for (let j=i+1; j<objects.length; j++) {
        const a=objects[i], b=objects[j];
        const dx=b.x-a.x, dy=b.y-a.y, distSq=dx*dx+dy*dy, minDist=a.r+b.r;
        if (distSq>=minDist*minDist||distSq<0.01) continue;
        const dist=Math.sqrt(distSq), nx=dx/dist, ny=dy/dist, ov=(minDist-dist)*0.5;
        if(!a.isDragging){a.x-=nx*ov;a.y-=ny*ov;} if(!b.isDragging){b.x+=nx*ov;b.y+=ny*ov;}
        const dot=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny; if(dot<=0) continue;
        const imp=dot*0.6;
        if(!a.isDragging){a.vx-=imp*nx;a.vy-=imp*ny;a.av+=imp*0.025*(Math.random()-0.5);}
        if(!b.isDragging){b.vx+=imp*nx;b.vy+=imp*ny;b.av-=imp*0.025*(Math.random()-0.5);}
      }
    }
  }
}

async function processImage(imgEl) {
  if (objects.some(o => o.isDemo)) {
    const keep = objects.filter(o => !o.isDemo);
    objects.length = 0;
    keep.forEach(o => objects.push(o));
  }

  const faces = await detectAndCropFaces(imgEl);
  if (faces.length === 0) {
    showToast('얼굴이 안 보여요! 더 가까이 찍은 사진을 써봐요 😅');
    return;
  }

  faces.forEach(face => {
    const scale = face.targetH / face.cropH;
    const fw = face.cropW * scale;
    const fh = face.targetH;
    const x = fw/2 + Math.random()*(canvas.width-fw);
    objects.push(new DropObject(face.img, x, -fh, fw, fh, false));
  });

  updateFaceCounter();
  if (faces.length > 1) showToast(`얼굴 ${faces.length}개 발견! 😊`, 'rgba(40,140,70,0.9)');
}

// 갤러리
uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => enqueue(img);
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  fileInput.value = '';
});

// 카메라
let stream = null, facingMode = 'environment';
async function startCamera() {
  try {
    if(stream) stream.getTracks().forEach(t=>t.stop());
    stream = await navigator.mediaDevices.getUserMedia({ video:{facingMode,width:{ideal:1280},height:{ideal:960}}, audio:false });
    video.srcObject = stream;
    video.classList.toggle('mirrored', facingMode==='user');
    cameraModal.classList.add('open');
  } catch { alert('카메라 권한이 필요해요.\n설정 > Safari > 카메라를 허용해주세요.'); }
}
function stopCamera() {
  if(stream) stream.getTracks().forEach(t=>t.stop());
  stream=null; cameraModal.classList.remove('open');
}
cameraBtn.addEventListener('click', startCamera);
closeCamBtn.addEventListener('click', stopCamera);
switchCamBtn.addEventListener('click', () => { facingMode=facingMode==='environment'?'user':'environment'; startCamera(); });
shootBtn.addEventListener('click', () => {
  const vw=video.videoWidth, vh=video.videoHeight;
  snapCanvas.width=vw; snapCanvas.height=vh;
  const sctx=snapCanvas.getContext('2d');
  if(facingMode==='user'){sctx.translate(vw,0);sctx.scale(-1,1);}
  sctx.drawImage(video,0,0);
  const img=new Image();
  img.onload=()=>enqueue(img);
  img.src=snapCanvas.toDataURL('image/jpeg',0.92);
  stopCamera();
});

shakeMainBtn.addEventListener('click', () => {
  objects.forEach(o => {
    if(!o.isDragging){
      o.vx+=(Math.random()-0.5)*24;
      o.vy+=(Math.random()-0.75)*20;
      o.av+=(Math.random()-0.5)*0.4;
    }
  });
});

resetBtn.addEventListener('click', () => confirmModal.classList.add('show'));
confirmNo.addEventListener('click', () => confirmModal.classList.remove('show'));
confirmYes.addEventListener('click', () => {
  objects.length=0; updateFaceCounter();
  confirmModal.classList.remove('show');
  showToast('초기화됐어요 🗑');
  setTimeout(spawnDemoFaces, 300);
});

// 드래그
let dragTarget = null;
function getPos(e){ if(e.touches) return{x:e.touches[0].clientX,y:e.touches[0].clientY}; return{x:e.clientX,y:e.clientY}; }

function onStart(e) {
  const {x,y}=getPos(e);
  if(y>canvas.height-PANEL_H) return;
  for(let i=objects.length-1;i>=0;i--){
    if(objects[i].hitTest(x,y)){
      dragTarget=objects[i]; dragTarget.isDragging=true;
      dragTarget.vx=0; dragTarget.vy=0;
      dragTarget.lastX=x; dragTarget.lastY=y; break;
    }
  }
}
function onMove(e) {
  if(e.cancelable) e.preventDefault();
  if(!dragTarget) return;
  const {x,y}=getPos(e);
  dragTarget.vx=x-dragTarget.lastX; dragTarget.vy=y-dragTarget.lastY;
  dragTarget.x=x; dragTarget.y=y;
  dragTarget.lastX=x; dragTarget.lastY=y;
}
function onEnd() { if(dragTarget){dragTarget.isDragging=false;dragTarget=null;} }

canvas.addEventListener('mousedown', onStart);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onEnd);
canvas.addEventListener('touchstart', onStart, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('touchend', onEnd);

function loop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  resolveCollisions();
  objects.forEach(o=>{o.update();o.draw();});
  requestAnimationFrame(loop);
}
loop();

spawnDemoFaces();
loadModels();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
