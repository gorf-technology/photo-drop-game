<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Photo Drop</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      min-height: 100vh;
      font-family: sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    #canvas { display: block; background: #000; }
    #ui {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
      align-items: center;
    }
    .btn {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 50px;
      padding: 12px 22px;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      white-space: nowrap;
      transition: background 0.12s;
    }
    .btn:active { background: rgba(255,255,255,0.3); }
    #shakeBtn {
      background: rgba(255,100,50,0.18);
      border-color: rgba(255,120,60,0.5);
      color: #ff9966;
    }
    #shakeBtn:active { background: rgba(255,100,50,0.45); }

    /* 카메라 모달 */
    #cameraModal {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #cameraModal.open { display: flex; }
    #video { width: 100%; max-height: 75vh; object-fit: cover; }
    #camControls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      align-items: center;
    }
    #shootBtn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 4px solid #fff;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
    }
    #shootBtn:active { background: rgba(255,255,255,0.6); }
    #closeCamBtn {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 50px;
      padding: 12px 22px;
      font-size: 14px;
      cursor: pointer;
    }
    #fileInput, #snapCanvas { display: none; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <button class="btn" id="cameraBtn">📷</button>
  <button class="btn" id="uploadBtn">🖼</button>
  <button class="btn" id="shakeBtn">🫨 흔들기</button>
  <input type="file" id="fileInput" accept="image/*" multiple>
</div>
<div id="cameraModal">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="snapCanvas"></canvas>
  <div id="camControls">
    <button id="closeCamBtn">✕ 닫기</button>
    <button id="shootBtn"></button>
    <button id="switchCamBtn" class="btn" style="padding:12px 18px;">🔄</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');
const cameraBtn = document.getElementById('cameraBtn');
const shakeBtn = document.getElementById('shakeBtn');
const cameraModal = document.getElementById('cameraModal');
const video = document.getElementById('video');
const shootBtn = document.getElementById('shootBtn');
const closeCamBtn = document.getElementById('closeCamBtn');
const switchCamBtn = document.getElementById('switchCamBtn');
const snapCanvas = document.getElementById('snapCanvas');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 물리 상수
const GRAVITY = 0.55;
const FLOOR_FRICTION = 0.75;
const BOUNCE = 0.22;
const AIR_FRICTION = 0.995;
const ANGULAR_DAMP = 0.85;

const objects = [];

class PhotoObject {
  constructor(img, x, y, w, h) {
    this.img = img;
    this.x = x;
    this.y = y;
    this.w = w;
    this.h = h;
    this.vx = (Math.random() - 0.5) * 4;
    this.vy = 0;
    this.angle = (Math.random() - 0.5) * 0.2;
    this.av = (Math.random() - 0.5) * 0.02;
    this.isDragging = false;
    this.lastX = x;
    this.lastY = y;
    // 충돌 반지름: 사진 크기의 절반 (짧은 쪽 기준)
    this.r = Math.min(w, h) * 0.48;
  }

  update() {
    if (this.isDragging) return;

    this.vy += GRAVITY;
    this.vx *= AIR_FRICTION;
    this.x += this.vx;
    this.y += this.vy;
    this.angle += this.av;
    this.av *= ANGULAR_DAMP;

    // 바닥
    const floor = canvas.height - this.h * 0.5;
    if (this.y >= floor) {
      this.y = floor;
      this.vy *= -BOUNCE;
      this.vx *= FLOOR_FRICTION;
      this.av *= FLOOR_FRICTION;
      if (Math.abs(this.vy) < 1.2) this.vy = 0;
    }

    // 왼쪽 벽
    const leftWall = this.w * 0.5;
    if (this.x <= leftWall) {
      this.x = leftWall;
      this.vx = Math.abs(this.vx) * BOUNCE;
      this.av *= -0.4;
    }

    // 오른쪽 벽
    const rightWall = canvas.width - this.w * 0.5;
    if (this.x >= rightWall) {
      this.x = rightWall;
      this.vx = -Math.abs(this.vx) * BOUNCE;
      this.av *= -0.4;
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 10;
    ctx.shadowOffsetY = 5;
    ctx.drawImage(this.img, -this.w / 2, -this.h / 2, this.w, this.h);
    ctx.restore();
  }

  hitTest(px, py) {
    return Math.abs(px - this.x) < this.w / 2 && Math.abs(py - this.y) < this.h / 2;
  }
}

// 사진끼리 충돌 (원형 근사, 여러 번 반복으로 쌓임 안정화)
function resolveCollisions() {
  const iterations = 3;
  for (let iter = 0; iter < iterations; iter++) {
    for (let i = 0; i < objects.length; i++) {
      for (let j = i + 1; j < objects.length; j++) {
        const a = objects[i];
        const b = objects[j];

        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const distSq = dx * dx + dy * dy;
        const minDist = a.r + b.r;

        if (distSq >= minDist * minDist || distSq < 0.001) continue;

        const dist = Math.sqrt(distSq);
        const nx = dx / dist;
        const ny = dy / dist;
        const overlap = (minDist - dist) * 0.5;

        // 드래그 중인 건 밀리지 않게
        if (!a.isDragging) { a.x -= nx * overlap; a.y -= ny * overlap; }
        if (!b.isDragging) { b.x += nx * overlap; b.y += ny * overlap; }

        // 속도 반응
        const relVx = a.vx - b.vx;
        const relVy = a.vy - b.vy;
        const dot = relVx * nx + relVy * ny;

        if (dot <= 0) continue;

        const restitution = 0.3;
        const impulse = dot * (1 + restitution) * 0.5;

        if (!a.isDragging) {
          a.vx -= impulse * nx;
          a.vy -= impulse * ny;
          a.av += impulse * 0.03 * (Math.random() - 0.5);
        }
        if (!b.isDragging) {
          b.vx += impulse * nx;
          b.vy += impulse * ny;
          b.av -= impulse * 0.03 * (Math.random() - 0.5);
        }
      }
    }
  }
}

// 흔들기
function shakeAll() {
  objects.forEach(o => {
    if (!o.isDragging) {
      o.vx += (Math.random() - 0.5) * 22;
      o.vy += (Math.random() - 0.7) * 20;
      o.av += (Math.random() - 0.5) * 0.35;
    }
  });
}

shakeBtn.addEventListener('click', shakeAll);

// 사진 추가
function addPhoto(imgEl) {
  const maxW = Math.min(canvas.width * 0.36, 210);
  const ratio = imgEl.height / imgEl.width;
  const w = maxW;
  const h = maxW * ratio;
  const x = w / 2 + Math.random() * (canvas.width - w);
  const y = -h;
  objects.push(new PhotoObject(imgEl, x, y, w, h));
}

// 갤러리
uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => addPhoto(img);
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  fileInput.value = '';
});

// 카메라
let stream = null;
let facingMode = 'environment';

async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    cameraModal.classList.add('open');
  } catch {
    alert('카메라 권한이 필요해요.\n설정 > Safari > 카메라를 허용해주세요.');
  }
}

function stopCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  cameraModal.classList.remove('open');
}

cameraBtn.addEventListener('click', startCamera);
closeCamBtn.addEventListener('click', stopCamera);
switchCamBtn.addEventListener('click', () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});
shootBtn.addEventListener('click', () => {
  snapCanvas.width = video.videoWidth;
  snapCanvas.height = video.videoHeight;
  snapCanvas.getContext('2d').drawImage(video, 0, 0);
  const img = new Image();
  img.onload = () => addPhoto(img);
  img.src = snapCanvas.toDataURL('image/jpeg', 0.9);
  stopCamera();
});

// 드래그 (마우스)
let dragTarget = null;

canvas.addEventListener('mousedown', (e) => {
  for (let i = objects.length - 1; i >= 0; i--) {
    if (objects[i].hitTest(e.clientX, e.clientY)) {
      dragTarget = objects[i];
      dragTarget.isDragging = true;
      dragTarget.vx = 0; dragTarget.vy = 0;
      dragTarget.lastX = e.clientX; dragTarget.lastY = e.clientY;
      break;
    }
  }
});
canvas.addEventListener('mousemove', (e) => {
  if (!dragTarget) return;
  dragTarget.vx = e.clientX - dragTarget.lastX;
  dragTarget.vy = e.clientY - dragTarget.lastY;
  dragTarget.x = e.clientX;
  dragTarget.y = e.clientY;
  dragTarget.lastX = e.clientX;
  dragTarget.lastY = e.clientY;
});
canvas.addEventListener('mouseup', () => {
  if (dragTarget) { dragTarget.isDragging = false; dragTarget = null; }
});

// 드래그 (터치)
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  for (let i = objects.length - 1; i >= 0; i--) {
    if (objects[i].hitTest(t.clientX, t.clientY)) {
      dragTarget = objects[i];
      dragTarget.isDragging = true;
      dragTarget.vx = 0; dragTarget.vy = 0;
      dragTarget.lastX = t.clientX; dragTarget.lastY = t.clientY;
      break;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!dragTarget) return;
  const t = e.touches[0];
  dragTarget.vx = t.clientX - dragTarget.lastX;
  dragTarget.vy = t.clientY - dragTarget.lastY;
  dragTarget.x = t.clientX;
  dragTarget.y = t.clientY;
  dragTarget.lastX = t.clientX;
  dragTarget.lastY = t.clientY;
}, { passive: false });

canvas.addEventListener('touchend', () => {
  if (dragTarget) { dragTarget.isDragging = false; dragTarget = null; }
});

// 게임 루프
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  resolveCollisions();
  objects.forEach(o => { o.update(); o.draw(); });
  requestAnimationFrame(loop);
}
loop();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
